name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check — lib
        run: |
          for f in lib/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Syntax check — functions
        run: |
          for f in netlify/functions/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Syntax check — API routes
        run: |
          find app/api -name 'route.js' | while read f; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Syntax check — DAL
        run: |
          for f in lib/dal/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Run tests
        run: node test.js
