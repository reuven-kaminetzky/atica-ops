 async _fetch(path, opts = {}) {
 try {

 credentials: 'include',
 headers: { 'Content-Type': 'application/json', ...opts.headers },
 ...opts,
 body: opts.body ? JSON.stringify(opts.body) : undefined});
 if (res.status === 401) { this._user = null; this._online = false; return null; }
 if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error || res.statusText); }
 return res.json();
 } catch (e) {
 this._online = false;
 return null;
 }
 },

 if(pos[idx].stage===5){
 autoCreateShipment(pos[idx]);
 }
 return pos[idx];
 };

 function getShipments(){
 try{return JSON.parse(localStorage.getItem(SHIPMENT_KEY)||'[]');}catch(e){return[];}
 }
 function saveShipments(s){try{localStorage.setItem(SHIPMENT_KEY,JSON.stringify(s));}catch(e){}}

 function getShipment(id){return getShipments().find(s=>s.id===id);}
 function autoCreateShipment(po){
 const shipments=getShipments();
 const container=po.container||null;
 if(container){
 const existing=shipments.find(s=>s.container===container&&s.status!=='delivered');
 if(existing){
 if(!existing.poIds.includes(po.id)){
 existing.poIds.push(po.id);
 existing.totalUnits+=po.units;
 existing.totalFOB+=(po.fobTotal||0);
 existing.products.push({poId:po.id,mpName:po.mpName,mpCode:po.mpCode,units:po.units,fob:po.fobTotal||0});
 addNotif('info','Logistics',`PO ${po.num} consolidated into shipment ${existing.id} (container ${container}).`,'shipping');
 }
 saveShipments(shipments);
 return existing;
 }
 }
 const id='SHP-'+new Date().getFullYear()+'-'+String(shipments.length+1).padStart(3,'0');
 const shipment={
 id,
 container:container||'TBC',

 forwarder:po.forwarder||'Straight Forwarding',
 poIds:[po.id],
 products:[{poId:po.id,mpName:po.mpName,mpCode:po.mpCode,units:po.units,fob:po.fobTotal||0}],

 ata:null, // actual arrival

 {date:new Date().toISOString().split('T')[0],event:'Shipment created',detail:'Auto-generated from PO '+po.num+' reaching stage 5',source:'system'}],

 if(po.eta){
 shipment.etaHistory.push({date:new Date().toISOString().split('T')[0],eta:po.eta,source:'PO data'});

 shipments.push(shipment);

 function updateShipmentStatus(shipId, status, detail){
 const shipments=getShipments();
 const s=shipments.find(x=>x.id===shipId);
 if(!s)return null;
 s.status=status;
 s.events.push({date:new Date().toISOString().split('T')[0],event:status,detail:detail||'',source:'manual'});
 saveShipments(shipments);
 return s;
 }
 function updateShipmentETA(shipId, newETA, source){
 const shipments=getShipments();
 const s=shipments.find(x=>x.id===shipId);
 if(!s)return null;
 const oldETA=s.eta;
 s.eta=newETA;
 s.etaHistory.push({date:new Date().toISOString().split('T')[0],eta:newETA,source:source||'manual'});
 s.events.push({date:new Date().toISOString().split('T')[0],event:'ETA updated',detail:`${oldETA||'none'} → ${newETA} (${source||'manual'})`,source:source||'manual'});
 saveShipments(shipments);
 return s;
 }
 function assignContainer(shipId, container){
 const shipments=getShipments();
 const s=shipments.find(x=>x.id===shipId);
 if(!s)return null;
 const other=shipments.find(x=>x.id!==shipId&&x.container===container&&x.status!=='delivered');
 if(other){
 s.poIds.forEach(pid=>{
 if(!other.poIds.includes(pid)){
 other.poIds.push(pid);
 const prod=s.products.find(p=>p.poId===pid);
 if(prod)other.products.push(prod);
 }
 });
 other.totalUnits=other.products.reduce((sum,p)=>sum+p.units,0);
 other.totalFOB=other.products.reduce((sum,p)=>sum+p.fob,0);
 other.events.push({date:new Date().toISOString().split('T')[0],event:'Consolidated',detail:`Merged shipment ${s.id} (container ${container})`,source:'system'});
 const idx=shipments.indexOf(s);
 if(idx>=0)shipments.splice(idx,1);
 saveShipments(shipments);
 addNotif('info','Logistics',`Shipment ${s.id} merged into ${other.id} — same container ${container}.`,'shipping');
 return other;
 }

 s.container=container;
 s.events.push({date:new Date().toISOString().split('T')[0],event:'Container assigned',detail:container,source:'manual'});
 saveShipments(shipments);
 return s;
 }

 function getCurrentSeason(){
 const now=new Date(), m=now.getMonth(), d=now.getDate();
 const md=m*100+d; // month*100+day for easy comparison
 for(const s of JEWISH_SEASONS){
 const [sm,sd]=s.gregApprox[0], [em,ed]=s.gregApprox[1];
 const start=sm*100+sd, end=em*100+ed;
 if(start<=end){if(md>=start&&md<=end)return s;}
 else{if(md>=start||md<=end)return s;} // wraps around year
 }
 return JEWISH_SEASONS[0];
 }

 function getSeasonalForecast(months){
 const prods=getProducts();
 const now=new Date();
 const forecast=[];
 for(let i=0;i<(months||6);i++){
 const d=new Date(now.getFullYear(),now.getMonth()+i,15);
 const m=d.getMonth(),day=d.getDate();
 const md=m*100+day;
 let season=JEWISH_SEASONS[0];
 for(const s of JEWISH_SEASONS){
 const [sm,sd]=s.gregApprox[0],[em,ed]=s.gregApprox[1];
 const start=sm*100+sd,end=em*100+ed;
 if(start<=end){if(md>=start&&md<=end){season=s;break;}}
 else{if(md>=start||md<=end){season=s;break;}}
 }
 const monthLabel=d.toLocaleString('en-US',{month:'short',year:'2-digit'});
 let totalRev=0,totalCOGS=0;
 const catBreakdown={};
 prods.forEach(p=>{
 const catMult=season.topCats.includes(p.cat)?season.multiplier:(season.multiplier>1?season.multiplier*0.6:season.multiplier);
 const weeklyRev=p.vel*p.retail*catMult;
 const monthlyRev=weeklyRev*4.33;
 const monthlyCOGS=p.vel*p.fob*1.34*catMult*4.33;
 totalRev+=monthlyRev;
 totalCOGS+=monthlyCOGS;
 if(!catBreakdown[p.cat])catBreakdown[p.cat]={rev:0,cogs:0,units:0};
 catBreakdown[p.cat].rev+=monthlyRev;
 catBreakdown[p.cat].cogs+=monthlyCOGS;
 catBreakdown[p.cat].units+=Math.round(p.vel*catMult*4.33);
 });
 forecast.push({month:monthLabel,date:d,season,totalRev:Math.round(totalRev),totalCOGS:Math.round(totalCOGS),
 grossProfit:Math.round(totalRev-totalCOGS),margin:totalRev>0?Math.round((totalRev-totalCOGS)/totalRev*100):0,
 catBreakdown});
 }
 return forecast;
 }

 function allocateLandedCost(poId){
 const po=getPO(poId);if(!po)return null;
 const p=getProduct(po.mpId);if(!p)return null;
 const styles=getStyles(po.mpId);
 const bkd=po.breakdown||{};
 const fobTotal=po.fobTotal||0;
 const freightRate=0.06; // 6% of FOB
 const dutyRate=(p.duty||17.5)/100;
 const brokerageRate=0.015; // 1.5%
 const inspectionRate=0.005; // 0.5%

 const freight=Math.round(fobTotal*freightRate*100)/100;
 const duty=Math.round(fobTotal*dutyRate*100)/100;
 const brokerage=Math.round(fobTotal*brokerageRate*100)/100;
 const inspection=Math.round(fobTotal*inspectionRate*100)/100;
 const totalLanded=fobTotal+freight+duty+brokerage+inspection;
 const styleAlloc=[];
 let totalUnits=0;
 styles.forEach(s=>{
 const styleBkd=bkd[s.code]||{};
 const units=Object.values(styleBkd).reduce((sum,v)=>sum+(parseInt(v)||0),0);
 totalUnits+=units;
 const styleFob=units*po.fob;
 styleAlloc.push({style:s.name,code:s.code,units,fob:styleFob});
 });
 if(!styleAlloc.length||totalUnits===0){
 styleAlloc.push({style:'All styles',code:'ALL',units:po.units,fob:fobTotal});
 totalUnits=po.units;
 }
 const result=styleAlloc.map(sa=>{
 const pct=fobTotal>0?sa.fob/fobTotal:1/styleAlloc.length;
 const aFreight=Math.round(freight*pct*100)/100;
 const aDuty=Math.round(duty*pct*100)/100;
 const aBrokerage=Math.round(brokerage*pct*100)/100;
 const aInspection=Math.round(inspection*pct*100)/100;
 const aTotal=sa.fob+aFreight+aDuty+aBrokerage+aInspection;
 const perUnit=sa.units>0?Math.round(aTotal/sa.units*100)/100:0;
 return{...sa, freight:aFreight, duty:aDuty, brokerage:aBrokerage, inspection:aInspection,
 totalLanded:aTotal, perUnit, pct:Math.round(pct*100)};
 });

 return{
 poId:po.id, poNum:po.num, mpName:po.mpName, vendor:po.vendor,
 fobTotal, freight, duty, brokerage, inspection, totalLanded,
 dutyRate:p.duty, hts:p.hts,
 perUnit:totalUnits>0?Math.round(totalLanded/totalUnits*100)/100:0,
 totalUnits, styles:result,
 journalEntries:generateLandedJournalEntries(po,p,fobTotal,freight,duty,brokerage,inspection,totalLanded)};
 }

 function getProductCostBreakdown(productId){
 const p=getProduct(productId);
 if(!p)return null;
 const bom=FABRIC_BOM[productId]||{fabrics:[],cmt:0,trims:0};

 let fabricCost=0;
 const fabricDetails=[];
 for(const fb of bom.fabrics){
 const ft=getFabricType(fb.fabricId);
 if(ft&&fb.metersPerUnit>0){
 const cost=fb.metersPerUnit*ft.pricePerM;
 fabricCost+=cost;
 fabricDetails.push({
 fabric:ft.name, mill:getFabricMill(ft.mill)?.name||ft.mill,
 meters:fb.metersPerUnit, pricePerM:ft.pricePerM,
 cost:Math.round(cost*100)/100, currency:ft.currency,
 composition:ft.composition});
 }
 }

 const totalCost=fabricCost+bom.cmt+bom.trims;
 const landed=p.fob*1.34;
 const margin=p.retail>0?(p.retail-landed)/p.retail*100:0;
 const fabricIncluded=bom.fabrics.length===0;

 return{
 productId, productName:p.name, productCode:p.code,
 fob:p.fob, retail:p.retail, landed:Math.round(landed*100)/100,
 margin:Math.round(margin*10)/10,
 fabricCost:Math.round(fabricCost*100)/100,
 cmt:bom.cmt,
 trims:bom.trims,
 calculatedTotal:Math.round(totalCost*100)/100,
 fabricIncluded, // true = vendor supplies fabric (FOB is all-in)
 fabricDetails,
 notes:bom.notes,
 variance:Math.round((p.fob-totalCost)*100)/100, // positive = FOB higher than BOM
 };
 }
 function getAllCostBreakdowns(){
 return getProducts().map(p=>getProductCostBreakdown(p.id)).filter(Boolean);
 }
 function getFabricForecast(){
 const pos=getPOs().filter(po=>po.status!=='complete');
 const forecast=[];

 for(const po of pos){
 const bom=FABRIC_BOM[po.mpId]||{fabrics:[]};
 for(const fb of bom.fabrics){
 if(fb.metersPerUnit<=0)continue;
 const ft=getFabricType(fb.fabricId);
 const metersNeeded=po.units*fb.metersPerUnit;
 const inv=FABRIC_INVENTORY.find(fi=>fi.fabricId===fb.fabricId&&fi.location===ft?.factoryDest);
 const available=inv?inv.meters:0;
 const shortage=Math.max(0,metersNeeded-available);

 forecast.push({
 poId:po.id, poNum:po.num, product:po.mpName,
 fabricId:fb.fabricId, fabricName:ft?.name||fb.fabricId,
 mill:getFabricMill(ft?.mill)?.name||'Unknown',
 factory:ft?.factoryDest||'Unknown',
 metersPerUnit:fb.metersPerUnit,
 unitsOrdered:po.units,
 metersNeeded:Math.round(metersNeeded),
 metersAvailable:available,
 shortage:Math.round(shortage),
 costPerM:ft?.pricePerM||0,
 totalCost:Math.round(metersNeeded*(ft?.pricePerM||0))});
 }
 }
 return forecast;
 }

 function getCashFlowProjection(months){
 const forecast=getSeasonalForecast(months||6);
 const pos=getPOs().filter(p=>p.status!=='complete');
 const ws=getWSOrders().filter(o=>o.paid<o.total);
 const fin=getRealFinancials();
 const realOpex=fin.opex.opex;
 const realShipDuty=fin.opex.shipDuty;
 const realMonths=fin.opex.months;
 const projPurch=fin.projectedPurchases;

 return forecast.map((f,i)=>{
 const fDate=new Date();
 fDate.setMonth(fDate.getMonth()+i);
 const monthIdx=fDate.getMonth()-2; // Mar=0 in our array (month 2 = March, so index = month-2)
 const opexVal=(monthIdx>=0&&monthIdx<10)?realOpex[monthIdx]:275000;
 const shipDutyVal=(monthIdx>=0&&monthIdx<10)?realShipDuty[monthIdx]:0;
 const invPurch=projPurch.reduce((s,cat)=>{
 return s+((monthIdx>=0&&monthIdx<10)?cat.monthly[monthIdx]:0);
 },0);
 const retailRev=Math.round(f.totalRev*0.7);
 const onlineRev=Math.round(f.totalRev*0.2);
 const wholesaleRev=Math.round(f.totalRev*0.1);
 const wsCollections=i<2?ws.reduce((s,o)=>s+Math.round((o.total-o.paid)/3),0):0;
 const totalIn=retailRev+onlineRev+wholesaleRev+wsCollections;
 const totalOut=opexVal+shipDutyVal+invPurch;

 return{
 ...f,
 inflows:{retail:retailRev,online:onlineRev,wholesale:wholesaleRev,wsCollections,total:totalIn},
 outflows:{opex:opexVal,shipDuty:shipDutyVal,invPurchases:invPurch,total:totalOut},
 netCash:totalIn-totalOut};
 });
 }

 function getOverlapScore(productA, productB) {
 if (productA === productB) return 100; // same product = perfect overlap
 const rule = OVERLAP_RULES.find(r => r.a === productA && r.b === productB);
 return rule ? rule.score : 0;
 }
 function getStyleOverlap(productId, styleA, styleB) {
 if (styleA === styleB) return 100;
 const styles = getStyles(productId);
 const a = styles.find(s => s.code === styleA || s.id === styleA);
 const b = styles.find(s => s.code === styleB || s.id === styleB);
 if (!a || !b) return 0;
 const darkColors = ['NV','BK','CH','STR','NVW'];
 const lightColors = ['WHT','GY','KH','WCB','BLU','GP'];
 const aIsDark = darkColors.includes(a.code);
 const bIsDark = darkColors.includes(b.code);

 if (aIsDark && bIsDark) return 50; // both dark colors
 if (!aIsDark && !bIsDark) return 45; // both light colors
 return 20; // one dark, one light — low substitution
 }

 const STORE_VELOCITY_SHARE = {
 'Lakewood': 0.25,
 'Flatbush': 0.10,
 'Crown Heights': 0.15,
 'Monsey': 0.30, // highest volume store
 'Online': 0.20};

 function getStoreShare(location) {
 return STORE_VELOCITY_SHARE[location] || 0.10;
 }

 function getOverlapCoverage(productId, location) {
 const prods = getProducts();
 let maxCoverage = 0;

 for (const other of prods) {
 if (other.id === productId) continue;
 const overlap = getOverlapScore(productId, other.id);
 if (overlap === 0) continue;

 const otherStock = getInventoryFor(other.id)[location] || 0;
 if (otherStock <= 0) continue;
 const reasonableLevel = Math.max(5, Math.ceil(other.vel * getStoreShare(location) * 4)); // 4 weeks supply
 const stockPct = Math.min(1, otherStock / reasonableLevel);
 const coverage = overlap * stockPct / 100;
 maxCoverage = Math.max(maxCoverage, coverage);
 }

 return Math.round(maxCoverage * 100); // 0-100
 }

 function calculateOptimalDistribution(productId) {
 const product = getProduct(productId);
 if (!product) return null;

 const currentInv = getInventoryFor(productId);
 const totalStock = Object.values(currentInv).reduce((s, v) => s + (v || 0), 0);
 const vel = product.vel || 0;
 const TARGET_WEEKS = 8; // aim for 8 weeks cover
 const totalNeed = Math.ceil(vel * TARGET_WEEKS);
 const storeTargets = {};
 const storeCurrents = {};
 const storeOverlap = {};
 let totalTarget = 0;

 for (const loc of STORE_LOCS) {
 const share = getStoreShare(loc);
 const target = Math.max(MIN_DISPLAY, Math.ceil(vel * share * TARGET_WEEKS));
 storeTargets[loc] = target;
 storeCurrents[loc] = currentInv[loc] || 0;
 storeOverlap[loc] = getOverlapCoverage(productId, loc);
 totalTarget += target;
 }
 const warehouseReserve = currentInv.Reserve || 0;
 const totalInStores = STORE_LOCS.reduce((s, l) => s + (currentInv[l] || 0), 0);
 const totalAvailable = totalInStores + warehouseReserve;
 let status, warehouseKeep;
 if (totalAvailable > totalTarget * 1.3) {
 status = 'overstock';
 warehouseKeep = totalAvailable - totalTarget; // keep excess in WH
 } else if (totalAvailable >= totalTarget * 0.7) {
 status = 'balanced';
 warehouseKeep = Math.max(0, totalAvailable - totalTarget);
 } else {
 status = 'short';
 warehouseKeep = 0; // deploy everything when short
 }

 const distributable = totalAvailable - warehouseKeep;
 const allocation = {};
 const urgency = {};
 let totalUrgency = 0;
 for (const loc of STORE_LOCS) {
 const overlapFactor = 1 - (storeOverlap[loc] / 100) * 0.5; // overlap reduces urgency by up to 50%
 urgency[loc] = getStoreShare(loc) * overlapFactor;
 totalUrgency += urgency[loc];
 }
 if (status === 'short') {
 let allocated = 0;
 const rawAlloc = {};

 for (const loc of STORE_LOCS) {
 const share = urgency[loc] / totalUrgency;
 rawAlloc[loc] = share * distributable;
 }
 const minTotal = STORE_LOCS.length * MIN_DISPLAY;
 if (distributable >= minTotal) {
 const remainder = distributable - minTotal;
 for (const loc of STORE_LOCS) {
 const share = urgency[loc] / totalUrgency;
 allocation[loc] = MIN_DISPLAY + Math.round(share * remainder);
 }
 } else {
 const sorted = STORE_LOCS.slice().sort((a, b) => urgency[b] - urgency[a]);
 let left = distributable;
 for (const loc of sorted) {
 const give = Math.min(MIN_DISPLAY, left);
 allocation[loc] = give;
 left -= give;
 if (left <= 0) break;
 }
 for (const loc of STORE_LOCS) {
 if (allocation[loc] === undefined) allocation[loc] = 0;
 }
 }
 } else {
 for (const loc of STORE_LOCS) {
 allocation[loc] = Math.min(storeTargets[loc], Math.round((urgency[loc] / totalUrgency) * distributable));
 }
 }
 let totalAlloc = STORE_LOCS.reduce((s, l) => s + (allocation[l] || 0), 0);
 if (totalAlloc > distributable) {
 const sorted = STORE_LOCS.slice().sort((a, b) => urgency[a] - urgency[b]);
 for (const loc of sorted) {
 const excess = totalAlloc - distributable;
 if (excess <= 0) break;
 const trim = Math.min(allocation[loc], excess);
 allocation[loc] -= trim;
 totalAlloc -= trim;
 }
 }
 const transfers = [];
 for (const loc of STORE_LOCS) {
 const diff = allocation[loc] - storeCurrents[loc];
 if (diff > 0) {
 transfers.push({ to: loc, qty: diff, from: 'Reserve', reason: 'Understocked (need +' + diff + ')' });
 } else if (diff < -3) { // only pull back if significantly over
 transfers.push({ to: 'Reserve', qty: -diff, from: loc, reason: 'Overstocked (return ' + (-diff) + ')' });
 }
 }

 return {
 productId, productName: product.name, productCode: product.code,
 status, // 'overstock', 'balanced', 'short'
 totalStock: totalAvailable,
 totalNeed: totalTarget,
 coverWeeks: vel > 0 ? Math.round(totalAvailable / vel) : 999,
 warehouseKeep,
 allocation,
 current: storeCurrents,
 targets: storeTargets,
 overlap: storeOverlap,
 urgency,
 transfers,
 vel, flag: product.flag};
 }

 function getDistributionPlan() {
 const prods = getProducts();
 const plans = prods.map(p => calculateOptimalDistribution(p.id)).filter(Boolean);
 const short = plans.filter(p => p.status === 'short').sort((a, b) => a.coverWeeks - b.coverWeeks);
 const balanced = plans.filter(p => p.status === 'balanced');
 const overstock = plans.filter(p => p.status === 'overstock');
 const allTransfers = [];
 for (const plan of plans) {
 for (const t of plan.transfers) {
 allTransfers.push({
 ...t,
 productId: plan.productId,
 productName: plan.productName,
 productCode: plan.productCode,
 status: plan.status,
 urgency: plan.status === 'short' ? 'high' : plan.status === 'balanced' ? 'medium' : 'low'});
 }
 }
 allTransfers.sort((a, b) => {
 const urgOrd = { high: 0, medium: 1, low: 2 };
 if (urgOrd[a.urgency] !== urgOrd[b.urgency]) return urgOrd[a.urgency] - urgOrd[b.urgency];
 return b.qty - a.qty;
 });

 return {
 plans, short, balanced, overstock,
 transfers: allTransfers,
 summary: {
 totalProducts: plans.length,
 shortProducts: short.length,
 balancedProducts: balanced.length,
 overstockProducts: overstock.length,
 totalTransfers: allTransfers.length,
 urgentTransfers: allTransfers.filter(t => t.urgency === 'high').length}
 };
 }

 function getOverlapReport(productId) {
 const product = getProduct(productId);
 if (!product) return null;
 const prods = getProducts();
 const coveredBy = []; // products that substitute for this one
 const coversFor = []; // products this one substitutes for

 for (const other of prods) {

 if (scoreIn > 0) coveredBy.push({ id: other.id, name: other.name, code: other.code, score: scoreIn, reason: OVERLAP_RULES.find(r => r.a === productId && r.b === other.id)?.reason || '' });
 if (scoreOut > 0) coversFor.push({ id: other.id, name: other.name, code: other.code, score: scoreOut, reason: OVERLAP_RULES.find(r => r.a === other.id && r.b === productId)?.reason || '' });
 }
 const locationCoverage = {};
 for (const loc of STORE_LOCS) {
 locationCoverage[loc] = getOverlapCoverage(productId, loc);
 }

 return { product: product.name, coveredBy: coveredBy.sort((a, b) => b.score - a.score), coversFor: coversFor.sort((a, b) => b.score - a.score), locationCoverage };
 }

 function validateSKU(sku, productId) {
 const errors = [];
 if (!sku || !sku.trim()) { errors.push('SKU is empty'); return { valid: false, errors }; }
 const p = getProduct(productId);
 if (!p) { errors.push('Product not found: ' + productId); return { valid: false, errors }; }

 const upper = sku.toUpperCase().trim();
 const code = p.code.toUpperCase();
 if (!upper.startsWith(code + '-') && upper !== code) {
 errors.push('SKU "' + sku + '" must start with product code "' + p.code + '-"');
 }
 const parts = upper.split('-');
 if (parts.length < 2) errors.push('SKU must have format: ' + p.code + '-{STYLE}[-{SIZE}]');
 if (/[^A-Z0-9\-.]/.test(upper)) errors.push('SKU can only contain letters, numbers, dashes, and dots');
 const allStyles = Object.values(load(KEYS.STYLES, SEED_STYLES)).flat();
 const dupe = allStyles.find(s => s.sku === sku && s.id !== (productId + '-' + parts.slice(1).join('-').toLowerCase()));
 if (dupe) errors.push('SKU "' + sku + '" already used by another style');

 return { valid: errors.length === 0, errors, parsed: { code, style: parts[1] || '', size: parts.slice(2).join('-') || '' } };
 }

 function validateProduct(data) {
 const errors = [];
 const warnings = [];
 if (!data.name || data.name.trim().length < 3) errors.push('Product name required (min 3 chars)');
 if (!data.code || data.code.trim().length < 2) errors.push('Product code required (min 2 chars)');
 if (!data.cat) errors.push('Category required');
 if (!data.vendor) errors.push('Vendor required');
 if (data.code && !/^[A-Z0-9]+$/.test(data.code.toUpperCase().trim())) {
 errors.push('Product code must be uppercase alphanumeric (e.g., HC360, LON, PKWY)');
 }
 const existing = getProducts().find(p => p.code === data.code && p.id !== data.id);
 if (existing) errors.push('Product code "' + data.code + '" already used by ' + existing.name);
 if (data.fob !== undefined) {
 if (data.fob <= 0) errors.push('FOB cost must be positive');
 if (data.fob > 500) warnings.push('FOB $' + data.fob + ' seems high — verify');
 }
 if (data.retail !== undefined) {
 if (data.retail <= 0) errors.push('Retail price must be positive');
 }
 if (data.fob && data.retail) {
 const landed = data.fob * 1.34;
 const margin = (data.retail - landed) / data.retail * 100;
 if (margin < 0) errors.push('NEGATIVE MARGIN — FOB $' + data.fob + ' landed $' + landed.toFixed(2) + ' > retail $' + data.retail);
 if (margin < 20) warnings.push('Margin only ' + margin.toFixed(0) + '% — verify pricing');
 if (margin > 95) warnings.push('Margin ' + margin.toFixed(0) + '% seems extremely high — verify FOB');
 }
 if (data.hts && !/^\d{4}\.\d{2}\.\d{4}$/.test(data.hts)) {
 warnings.push('HTS code "' + data.hts + '" should be format XXXX.XX.XXXX');
 }
 if (data.duty !== undefined && (data.duty < 0 || data.duty > 50)) {
 warnings.push('Duty rate ' + data.duty + '% seems unusual (expected 0-50%)');
 }
 if (data.vendor && !getVendors().find(v => v.name === data.vendor)) {
 warnings.push('Vendor "' + data.vendor + '" not found in vendor database');
 }

 return { valid: errors.length === 0, errors, warnings };
 }

 function validatePO(data) {
 const errors = [];
 const warnings = [];
 if (!data.mpId) errors.push('Master product required');
 if (!data.vendor) errors.push('Vendor required');
 if (!data.units || data.units <= 0) errors.push('Units must be positive');

 const product = data.mpId ? getProduct(data.mpId) : null;
 if (data.mpId && !product) errors.push('Product "' + data.mpId + '" not found');

 if (product) {
 if (data.fob && Math.abs(data.fob - product.fob) / product.fob > 0.25) {
 warnings.push('FOB $' + data.fob + ' differs from master product FOB $' + product.fob + ' by >25%');
 }
 if (data.vendor && data.vendor !== product.vendor) {
 warnings.push('Vendor "' + data.vendor + '" differs from product default vendor "' + product.vendor + '"');
 }
 if (data.units && data.units < product.moq) {
 warnings.push('Order qty ' + data.units + ' is below MOQ of ' + product.moq);
 }
 if (data.styles && data.styles.length) {
 const validStyles = getStyles(product.id);
 const validCodes = validStyles.map(s => s.code);
 for (const sc of data.styles) {
 if (!validCodes.includes(sc)) {
 errors.push('Style "' + sc + '" not valid for ' + product.name + '. Valid: ' + validCodes.join(', '));
 }
 }
 }
 if (data.styles && data.sizes) {
 const expectedSKUs = [];
 for (const style of data.styles) {
 for (const size of data.sizes) {
 expectedSKUs.push(product.code + '-' + style + '-' + size);
 }
 }
 data._expectedSKUs = expectedSKUs;
 data._skuCount = expectedSKUs.length;
 }
 }
 if (data.fob && data.units) {
 const fobTotal = data.fob * data.units;
 if (fobTotal > 200000) warnings.push('FOB total $' + fobTotal.toLocaleString() + ' — this is a large order');
 if (fobTotal < 100) warnings.push('FOB total only $' + fobTotal.toFixed(0) + ' — very small order');
 }

 return { valid: errors.length === 0, errors, warnings };
 }
 function runIntegrityCheck() {
 const issues = [];
 const prods = getProducts();

 for (const p of prods) {
 const pv = validateProduct(p);
 pv.errors.forEach(e => issues.push({ type: 'error', entity: p.name, msg: e }));
 pv.warnings.forEach(w => issues.push({ type: 'warning', entity: p.name, msg: w }));
 const styles = getStyles(p.id);
 const seenSKUs = new Set();
 for (const s of styles) {
 const sv = validateSKU(s.sku, p.id);
 sv.errors.forEach(e => issues.push({ type: 'error', entity: p.name + ' / ' + s.name, msg: e }));

 if (seenSKUs.has(s.sku)) {
 issues.push({ type: 'error', entity: p.name, msg: 'Duplicate SKU: ' + s.sku });
 }
 seenSKUs.add(s.sku);
 }
 }
 const pos = getPOs();
 for (const po of pos) {
 const pv = validatePO(po);
 pv.errors.forEach(e => issues.push({ type: 'error', entity: po.num, msg: e }));
 pv.warnings.forEach(w => issues.push({ type: 'warning', entity: po.num, msg: w }));
 }

 return { issues, errorCount: issues.filter(i => i.type === 'error').length, warningCount: issues.filter(i => i.type === 'warning').length };
 }

 function getProjection(weeks) {
 const prods = getProducts();
 const allPOs = getPOs().filter(po => po.status !== 'complete');
 const season = getCurrentSeason();
 const mult = season.multiplier || 1;
 const cutoffDate = new Date();
 cutoffDate.setDate(cutoffDate.getDate() + weeks * 7);

 const rows = [];

 prods.forEach(p => {
 const styles = getStyles(p.id);
 const inv = getInventoryFor(p.id);
 const totalProductStock = totalStock(p.id);
 const productPOs = allPOs.filter(po => po.mpId === p.id);
 const incomingUnits = productPOs.reduce((sum, po) => {
 if (!po.eta) return sum;
 const etaDate = new Date(po.eta);
 return etaDate <= cutoffDate ? sum + po.units : sum;
 }, 0);
 const totalStyleVel = styles.reduce((s, st) => s + (st.vel || 0), 0) || 1;

 styles.forEach(st => {
 const velShare = totalStyleVel > 0 ? (st.vel || 0) / totalStyleVel : 1 / styles.length;
 const styleStock = Math.round(totalProductStock * velShare);
 const styleIncoming = Math.round(incomingUnits * velShare);
 const weeklyBurn = (st.vel || 0) * mult;
 const totalBurn = Math.round(weeklyBurn * weeks);
 const projected = Math.max(0, styleStock + styleIncoming - totalBurn);
 const weeksToZero = weeklyBurn > 0 ? Math.round((styleStock + styleIncoming) / weeklyBurn) : 999;
 const willStockout = projected === 0 && weeklyBurn > 0;

 rows.push({
 mpId: p.id,
 mpName: p.name,
 mpCode: p.code,
 category: p.cat,
 vendor: p.vendor,
 retail: p.retail,
 fob: p.fob,
 flag: p.flag,

 styleId: st.id,
 styleName: st.name,
 styleCode: st.code,
 sku: st.sku,
 color: st.color,
 colorFamily: st.colorFamily || 'dark',
 grade: st.grade || 'B',
 currentStock: styleStock,
 velocity: st.vel || 0,
 sellThru: st.sell || 0,
 seasonMult: mult,
 weeklyBurn,
 incoming: styleIncoming,
 incomingPOs: productPOs.map(po => po.num),
 totalBurn,
 projectedStock: projected,
 weeksToZero,
 willStockout,
 delta: projected - styleStock});
 });
 });

 return rows;
 }
 function aggregateProjection(rows, groupBy) {
 const groups = {};
 rows.forEach(r => {
 const key = groupBy(r);
 if (!groups[key]) groups[key] = { key, rows: [], currentStock: 0, projectedStock: 0, incoming: 0, totalBurn: 0, velocity: 0, willStockout: 0 };
 const g = groups[key];
 g.rows.push(r);
 g.currentStock += r.currentStock;
 g.projectedStock += r.projectedStock;
 g.incoming += r.incoming;
 g.totalBurn += r.totalBurn;
 g.velocity += r.velocity;
 if (r.willStockout) g.willStockout++;
 });
 return Object.values(groups).sort((a, b) => a.projectedStock - b.projectedStock);
 }

 // ── Shopify Live Sync Bridge ──────────────────────────────────
 // Fetches real data from Shopify API and merges into app data model.
 // Preserves business-only fields (FOB, duty, HTS, lead, MOQ) from seed,
 // while replacing images, variants, inventory, velocity, prices with live data.

 const _CODE_TO_ID = {};
 SEED_PRODUCTS.forEach(p => { _CODE_TO_ID[p.code.toUpperCase()] = p.id; });

 // ── Title-based matching patterns ──────────────────────────
 // Maps seed product id → { match(title, price) → boolean }
 // Each seed product line matches one or more Shopify products by title keywords.
 // Products starting with "DO NOT USE" are always excluded.
 const _TITLE_MATCHERS = {
   // ── Shirts ──
   'londoner':       t => /londoner/i.test(t) && !/boys/i.test(t),
   'dress':          t => (/dress\s+(shirt|collar)/i.test(t) || /brooklyner/i.test(t) || /CML\s+MC\s+Shirt/i.test(t)) && !/boys/i.test(t) && !/performance/i.test(t) && !/do not use/i.test(t),
   'knit':           t => /polo/i.test(t) && !/boys/i.test(t),
   'milano':         t => /milano/i.test(t),
   'edinburgh':      t => /edinburgh/i.test(t),
   'bengal':         t => /bengal/i.test(t),
   'oxford-bd':      t => /oxford\s+button/i.test(t),
   'linen-shirt':    t => /linen.*shirt/i.test(t),
   'perf-shirt':     t => (/performance.*(shirt|polo|tee)/i.test(t) || /buttonless.*polo/i.test(t)) && !/do not use/i.test(t),
   'tuxedo-shirt':   t => /tuxedo\s+shirt/i.test(t),
   'band-collar':    t => /band\s+collar/i.test(t),
   'windowpane':     t => /windowpane/i.test(t),
   'herringbone':    t => /herringbone/i.test(t),
   'royal-oxford':   t => /royal\s+oxford/i.test(t),
   'pinpoint':       t => /pinpoint/i.test(t) || /boston.*shirt/i.test(t),
   // ── Suits ──
   'hc360':          (t, p) => (/half\s+canvas\s+(suit|pant)/i.test(t) || /barberis.*half/i.test(t)) && !/boys/i.test(t) && !/do not use/i.test(t) && p <= 400,
   'hc480':          (t, p) => (/half\s+canvas\s+(suit|pant)/i.test(t) || /barberis.*half/i.test(t)) && !/boys/i.test(t) && !/do not use/i.test(t) && p > 400,
   'wash-suit':      t => /washable\s+suit/i.test(t) && !/boys/i.test(t),
   'summer-suit':    t => /summer.*suit/i.test(t) || /linen.*suit/i.test(t),
   // ── Blazers ──
   'wash-blazer':    t => /parkway.*blazer/i.test(t) || (/travel\s+blazer/i.test(t) && !/cerruti/i.test(t)),
   'travel-blazer':  t => /cerruti/i.test(t),

   // ── Pants ──
   '5pkt':           t => /parkway/i.test(t) && /pant|stretch/i.test(t),
   'suit-pant':      t => (/suit\s+pant/i.test(t) || /essential.*(stretch\s+)?pant/i.test(t)) && !/boys/i.test(t) && !/do not use/i.test(t) && !/parkway/i.test(t) && !/half\s+canvas/i.test(t),
   // ── Outerwear ──
   'kapote':         t => /kapote/i.test(t) && !/silk/i.test(t),
   'silk-kapote':    t => /silk.*kapote/i.test(t),
   'raincoat':       t => /overcoat/i.test(t) || /raincoat/i.test(t),
   // ── Accessories ──
   'ties':           t => /\btie\b/i.test(t) || /\bties\b/i.test(t),
   'belts':          t => /\bbelt\b/i.test(t),
   // ── Shoes ──
   'dress-shoe':     t => /oxford/i.test(t) || /wholecut/i.test(t) || /dress\s+shoe/i.test(t) || /brogue/i.test(t),
   'luxury-shoe':    t => /loafer/i.test(t) || /beatle/i.test(t) || /monk/i.test(t) || /chelsea/i.test(t) || /buckle\s+strap/i.test(t) || /brace\s+/i.test(t),
   // ── Boys ──
   'boys-suit':      t => /boys.*(suit|half\s+canvas)/i.test(t) && !/pant/i.test(t) && !/do not use/i.test(t),
   'boys-shirt':     t => /boys.*(shirt|londoner)/i.test(t),
   'boys-blazer':    t => /boys.*blazer/i.test(t) && !/do not use/i.test(t),
   'boys-pant':      t => /boys.*(pant|trouser)/i.test(t) && !/do not use/i.test(t),
 };

 async function syncFromShopify() {
   try {
     // 1. Check connectivity
     const statusRes = await fetch('/api/shopify/status');
     if (!statusRes.ok) return { synced: false, reason: 'API unavailable' };
     const statusData = await statusRes.json();
     if (!statusData.connected) return { synced: false, reason: 'Not connected' };
     console.log('[Sync] Shopify connected:', statusData.shop, statusData.domain);

     // 2. Fetch products, inventory, velocity, sales, and orders in parallel
     const [prodRes, invRes, velRes, salesRes, ordersRes] = await Promise.all([
       fetch('/api/shopify/sync/products', { method: 'POST' }),
       fetch('/api/shopify/sync/inventory', { method: 'POST' }),
       fetch('/api/shopify/velocity?days=30'),
       fetch('/api/shopify/sales?days=30'),
       fetch('/api/shopify/sync/orders', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ since: new Date(Date.now() - 90*86400000).toISOString() }) }),
     ]);
     const prodData  = prodRes.ok  ? await prodRes.json()  : null;
     const invData   = invRes.ok   ? await invRes.json()   : null;
     const velData   = velRes.ok   ? await velRes.json()   : null;
     const salesData = salesRes.ok ? await salesRes.json()  : null;
     const ordersData = ordersRes.ok ? await ordersRes.json() : null;

     if (!prodData || !prodData.products) {
       console.warn('[Sync] No product data returned');
       return { synced: false, reason: 'No product data' };
     }
     console.log('[Sync] Fetched:', prodData.count, 'products,', invData?.locations?.length || 0, 'inv locations');

     // 3. Build lookup indexes
     // SKU → { shopify product, variant }
     const skuToShopify = {};
     for (const sp of prodData.products) {
       for (const v of sp.variants) {
         if (v.sku) skuToShopify[v.sku.toUpperCase()] = { product: sp, variant: v };
       }
     }

     // Velocity by SKU
     const velBySku = {};
     if (velData && velData.velocity) {
       for (const v of velData.velocity) velBySku[(v.sku || '').toUpperCase()] = v;
     }

     const normLoc = (n) => {
       const s=(n||'').toLowerCase();
       if(s.includes('lakewood'))   return 'Lakewood';
       if(s.includes('flatbush')||s.includes('brooklyn')) return 'Flatbush';
       if(s.includes('crown')) return 'Crown Heights';
       if(s.includes('monsey')||s.includes('spring val')) return 'Monsey';
       if(s.includes('online')||s.includes('web')) return 'Online';
       if(s.includes('reserve')||s.includes('warehouse')||s.includes('storage')) return 'Reserve';
       if(s.includes('wholesale')) return 'Wholesale';
       return n;
     };
     // Inventory by inventoryItemId → { locationName: available }
     const invByItemId = {};
     if (invData && invData.locations) {
       for (const loc of invData.locations) {
         for (const lvl of loc.levels) {
           if (!invByItemId[lvl.inventoryItemId]) invByItemId[lvl.inventoryItemId] = {};
           const _ln = normLoc(loc.locationName);
           if (_ln) invByItemId[lvl.inventoryItemId][_ln] = (invByItemId[lvl.inventoryItemId][_ln]||0)+(lvl.available||0);
         }
       }
     }

     // 4. Match Shopify products to seed products
     // Strategy: match by title patterns → seed product id
     // Each seed product line aggregates ALL matching Shopify products
     const shopifyBySeedId = {}; // seedId → [shopify product, ...]
     for (const sp of prodData.products) {
       if (/^DO NOT USE/i.test(sp.title)) continue; // skip disabled products
       const maxPrice = Math.max(...(sp.variants || []).map(v => parseFloat(v.price) || 0), 0);
       for (const [seedId, matcher] of Object.entries(_TITLE_MATCHERS)) {
         try {
           if (matcher(sp.title, maxPrice)) {
             if (!shopifyBySeedId[seedId]) shopifyBySeedId[seedId] = [];
             shopifyBySeedId[seedId].push(sp);
             break; // each Shopify product maps to at most one seed product
           }
         } catch(e) { /* skip matcher errors */ }
       }
     }
     console.log('[Sync] Title-matched seed products:', Object.keys(shopifyBySeedId).length, 'of', Object.keys(_TITLE_MATCHERS).length);

     // 5. Enrich products, styles, inventory
     const products  = JSON.parse(JSON.stringify(SEED_PRODUCTS)); // fresh copy from seed
     const styles    = JSON.parse(JSON.stringify(SEED_STYLES));
     const inventory = JSON.parse(JSON.stringify(SEED_INV));
     let matchCount = 0;

     for (const prod of products) {
       const matchedShopify = shopifyBySeedId[prod.id];
       if (!matchedShopify || matchedShopify.length === 0) continue;
       matchCount++;

       // Use the first matching Shopify product as the "primary" for images/handle
       const sp = matchedShopify[0];

       // ── Enrich product ──
       prod.shopifyId = sp.shopifyId;
       prod.shopifyHandle = sp.handle;
       prod.shopifyStatus = sp.status;
       prod.shopifyTags = sp.tags;
       prod.shopifyUpdatedAt = sp.updatedAt;
       prod.shopifyMatchCount = matchedShopify.length; // how many Shopify products in this line
       if (sp.images && sp.images.length > 0) {
         prod.heroImg = sp.images[0].src;
         // Collect images from all matching products (up to 12)
         const allImages = matchedShopify.flatMap(mp => (mp.images || []).map(i => i.src));
         prod.gallery = allImages.slice(0, 12);
       }
       if (sp.handle) prod.shopifyUrl = 'https://aticaman.com/products/' + sp.handle;

       // ── Build live styles from ALL matching Shopify product variants ──
       const seedStyles = styles[prod.id] || [];
       // Group Shopify variants by COLOR — not by fit (Lorenzo/Alexander) or size
       const FIT_NAMES = /^(lorenzo|alexander|classic|modern|slim|regular|relaxed|tailored|standard|athletic|comfort|straight|traditional|contemporary|fitted|narrow|wide|pleated)$/i;
       const SIZE_PAT = /^(\d{1,2}[xX]\d{2}|\d{2}[SRLT]|[xX]{0,2}[sSmMlLxX]{1,3}[lL]?|\d{2,3}(\.\d)?(\/\d+)?|one\s*size)$/i;
       const getColorIdx = (opts) => { const i=(opts||[]).findIndex(o=>/color|colour|fabric|style/i.test(o.name)); return i>=0?i:(opts&&opts.length===1?0:-1); };
       const getColor = (title, opts) => {
         const parts = (title||'').split(' / ').map(p=>p.trim()).filter(Boolean);
         const ci = getColorIdx(opts); if(ci>=0&&parts[ci]) return parts[ci];
         const cp = parts.filter(p=>!SIZE_PAT.test(p)&&!FIT_NAMES.test(p));
         return cp.length>0?cp.join(' / '):(parts.filter(p=>!SIZE_PAT.test(p))[0]||parts[0]||'Default');
       };
       const CLR_PAL = ['#1a2a4a','#4a4a4a','#c8c8c8','#2a4a2a','#8a3a2a','#3a5a78','#6a5a4a','#4a3a6a','#7a6a5a','#2a3a5a','#5a3a2a','#3a6a5a','#6a4a3a','#2a5a4a'];
       let _ci = 0;
       const sGroups = {};
       for (const mp of matchedShopify) {
         const mpOpts = mp.options||[];
         for (const sv of mp.variants) {
           const skuUpper = (sv.sku||'').toUpperCase();
           const existing = seedStyles.find(s=>s.sku&&s.sku.toUpperCase()===skuUpper);
           const vel = velBySku[skuUpper]||{};
           const colorName = getColor(sv.title, mpOpts);
           const gKey = (matchedShopify.length>1&&mp.title!==sp.title?mp.title+' — ':'')+colorName;
           if (!sGroups[gKey]) {
             const es = seedStyles.find(s=>s.name&&s.name.toLowerCase().includes(colorName.toLowerCase()))||existing;
             sGroups[gKey] = {
               id: es?es.id:('sc-'+prod.id+'-'+colorName.replace(/[^a-z0-9]/gi,'').toLowerCase().slice(0,10)),
               code: es?es.code:colorName.slice(0,4).toUpperCase().replace(/\s/g,''),
               name: gKey, color: es?es.color:CLR_PAL[_ci++%CLR_PAL.length],
               skus:[], fits:[], status:'active', shopify:true, shopifyProductTitle:mp.title,
               price:parseFloat(sv.price)||0, inventoryQty:0, inventoryItemIds:[],
               sell:es?es.sell:50, vel:0, grade:es?es.grade:'C', colorFamily:es?es.colorFamily:'dark',
             };
           }
           const g = sGroups[gKey];
           if(sv.sku) g.skus.push(sv.sku);
           if(sv.inventoryItemId) g.inventoryItemIds.push(sv.inventoryItemId);
           g.inventoryQty += (sv.inventoryQty||0);
           if(vel.unitsPerDay) g.vel += Math.round(vel.unitsPerDay*30*10)/10;
           (sv.title||'').split(' / ').filter(p=>FIT_NAMES.test(p.trim())).forEach(f=>{if(!g.fits.includes(f.trim()))g.fits.push(f.trim());});
         }
       }
       const liveStyles = Object.values(sGroups).map(g=>({...g,sku:g.skus[0]||'',vel:Math.round(g.vel*10)/10}));
       if (liveStyles.length > 0) styles[prod.id] = liveStyles;
       // ── Aggregate product velocity from live styles ──
       const totalVel = liveStyles.reduce((s, st) => s + (st.vel || 0), 0);
       if (totalVel > 0) prod.vel = Math.round(totalVel * 10) / 10;

       // ── Update retail price from Shopify (max variant price across all matches) ──
       const prices = matchedShopify.flatMap(mp => mp.variants.map(v => parseFloat(v.price))).filter(p => p > 0);
       if (prices.length > 0) prod.retail = Math.max(...prices);

       // ── Build live inventory from ALL matching Shopify products ──
       const liveInv = {};
       for (const mp of matchedShopify) {
         for (const sv of mp.variants) {
           if (sv.inventoryItemId && invByItemId[sv.inventoryItemId]) {
             for (const [locName, avail] of Object.entries(invByItemId[sv.inventoryItemId])) {
               liveInv[locName] = (liveInv[locName] || 0) + avail;
             }
           }
         }
       }
       if (Object.keys(liveInv).length > 0) {
         inventory[prod.id] = liveInv;

     }

     // 5b. Auto-create master products for unmatched Shopify products
     // Shopify "products" = our "styles". Group unmatched ones into new master product lines.

     for (const arr of Object.values(shopifyBySeedId)) {
       for (const sp of arr) matchedShopifyIds.add(sp.shopifyId);
     }

     // Group unmatched products by category prefix (first significant word(s) in title)
     const unmatchedGroups = {};
     const _categorize = (title) => {
       const t = title.trim();
       if (/gift\s+card/i.test(t))              return '_gift-cards';
       if (/baseball|cap\b/i.test(t))           return '_caps';
       if (/suit\s*(bag|cover)/i.test(t))       return '_suit-bags';
       if (/cufflink/i.test(t))                 return '_cufflinks';
       if (/sock/i.test(t))                     return '_socks';
       if (/scarf|wrap/i.test(t))               return '_scarves';
       if (/suspender/i.test(t))                return '_suspenders';
       if (/pocket\s*square/i.test(t))          return '_pocket-squares';
       if (/shirt/i.test(t))                    return '_other-shirts';
       if (/pant|trouser/i.test(t))             return '_other-pants';
       if (/suit/i.test(t))                     return '_other-suits';
       if (/blazer|jacket|sport\s*coat/i.test(t)) return '_other-blazers';
       if (/shoe|boot|loafer|oxford/i.test(t))  return '_other-shoes';
       return '_misc';
     };

     const _groupLabels = {
       '_gift-cards': 'Gift Cards', '_caps': 'Caps & Hats', '_suit-bags': 'Suit Bags',
       '_cufflinks': 'Cufflinks', '_socks': 'Socks', '_scarves': 'Scarves',
       '_suspenders': 'Suspenders', '_pocket-squares': 'Pocket Squares',
       '_other-shirts': 'Other Shirts', '_other-pants': 'Other Pants',
       '_other-suits': 'Other Suits', '_other-blazers': 'Other Blazers',
       '_other-shoes': 'Other Shoes', '_misc': 'Miscellaneous',
     };

     for (const sp of prodData.products) {
       if (/^DO NOT USE/i.test(sp.title)) continue;
       if (matchedShopifyIds.has(sp.shopifyId)) continue;
       const groupId = _categorize(sp.title);
       if (!unmatchedGroups[groupId]) unmatchedGroups[groupId] = [];
       unmatchedGroups[groupId].push(sp);
     }

     let autoCreated = 0;
     for (const [groupId, shopifyProds] of Object.entries(unmatchedGroups)) {
       const primary = shopifyProds[0];
       const groupName = _groupLabels[groupId] || groupId;
       const newProd = {
         id: groupId,
         code: groupId.replace(/^_/, '').toUpperCase().replace(/-/g, ''),
         name: groupName,
         cat: /shirt/i.test(groupName) ? 'Shirts' : /pant/i.test(groupName) ? 'Pants' :
              /suit/i.test(groupName) ? 'Suits' : /blazer/i.test(groupName) ? 'Blazers' :
              /shoe|boot/i.test(groupName) ? 'Shoes' : 'Accessories',
         shopifyId: primary.shopifyId,
         shopifyHandle: primary.handle,
         shopifyStatus: primary.status,
         shopifyMatchCount: shopifyProds.length,

       if (primary.images && primary.images.length > 0) {

       // Build styles from all Shopify products in this group
       const groupStyles = [];
       for (const mp of shopifyProds) {

           groupStyles.push({

       // Aggregate inventory

       for (const mp of shopifyProds) {
         for (const sv of mp.variants) {
           if (sv.inventoryItemId && invByItemId[sv.inventoryItemId]) {

           }
         }
       }
       if (Object.keys(liveInv).length > 0) {

       }
     }
     console.log('[Sync] Auto-created', autoCreated, 'new product lines from', Object.values(unmatchedGroups).reduce((s, g) => s + g.length, 0), 'unmatched Shopify products');

     // 6. Persist enriched data to localStorage
     save(KEYS.PRODUCTS, products);
     save(KEYS.STYLES, styles);
     save(KEYS.INVENTORY, inventory);

     if (salesData) save('am_shopify_sales', salesData);
     if (velData)   save('am_shopify_velocity', velData);

     // 7b. Bridge Shopify orders → am_sales (Retail page format)
     if (ordersData && ordersData.orders && ordersData.orders.length > 0) {
       try {
         const shopifyIdToSeed = {};
         for (const [seedId, spList] of Object.entries(shopifyBySeedId)) {
           for (const sp of spList) {
             shopifyIdToSeed[sp.shopifyId] = seedId;
             for (const v of sp.variants) { shopifyIdToSeed['v_' + v.variantId] = seedId; }
           }
         }
         const variantToStyle = {};
         for (const stArr of Object.values(styles)) {
           if (!Array.isArray(stArr)) continue;
           for (const st of stArr) {
             if (st.shopifyVariantId) variantToStyle[st.shopifyVariantId] = st.id;
           }
         }
         const bridgedSales = [];
         for (const order of ordersData.orders) {
           const items = [];
           for (const li of order.lineItems) {
             items.push({
               mpId: shopifyIdToSeed[li.productId] || shopifyIdToSeed['v_' + li.variantId] || null,
               styleId: variantToStyle[li.variantId] || null,
               size: li.variantTitle || 'OS', qty: li.quantity,
               price: parseFloat(li.price) || 0, title: li.title, sku: li.sku
             });
           }
           bridgedSales.push({
             id: 'shp_' + order.shopifyId,
             date: (order.createdAt || '').slice(0, 10),
             store: 'Shopify',
             custId: order.customer ? ('shp_cust_' + order.customer.id) : null,
             custName: order.customer ? (order.customer.firstName + ' ' + order.customer.lastName).trim() : 'Guest',
             orderName: order.name,
             items: items,
             subtotal: parseFloat(order.subtotalPrice) || 0,
             discount: parseFloat(order.totalDiscount) || 0,
             total: parseFloat(order.totalPrice) || 0,
             financialStatus: order.financialStatus,
             fulfillmentStatus: order.fulfillmentStatus,
             source: 'shopify'
           });
         }
         const existingSales = (()=>{ try { return JSON.parse(localStorage.getItem('am_sales')||'[]'); } catch(e) { return []; } })();
         const manualSales = existingSales.filter(s => !s.source || s.source !== 'shopify');
         const merged = [...manualSales, ...bridgedSales];
         merged.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
         try { localStorage.setItem('am_sales', JSON.stringify(merged)); } catch(e) {}

         // Build per-product velocity from bridged sales (units/week)
         const velByProd = {};
         const daysSynced = 90; // we sync last 90 days
         for (const order of bridgedSales) {
           for (const item of (order.items||[])) {
             if (!item.mpId) continue;
             velByProd[item.mpId] = (velByProd[item.mpId]||0) + (item.qty||0);
           }
         }
         const velMap = {};
         for (const [id, units] of Object.entries(velByProd)) {
           velMap[id] = Math.round((units / daysSynced) * 7 * 10) / 10;
         }
         try { localStorage.setItem('am_shopify_velocity', JSON.stringify(velMap)); } catch(e) {}

         console.log('[Sync] Bridged', bridgedSales.length, 'Shopify orders to am_sales (' + manualSales.length + ' manual +', bridgedSales.length, 'Shopify)');
       } catch (bridgeErr) { console.warn('[Sync] Sales bridge error:', bridgeErr.message); }
     }

     // 8. Update integration status to reflect live sync
     const intg = getIntegrations();
     intg.shopify = {
       connected: true,
       lastSync: new Date().toISOString(),
       store: statusData.domain || 'atica-brand.myshopify.com',
       syncedProducts: prodData.count,
       syncedOrders: ordersData ? ordersData.count : (salesData ? salesData.totalOrders : (intg.shopify ? intg.shopify.syncedOrders : 0)),
       bridgedSales: ordersData ? ordersData.count : 0,
       syncedInventory: !!invData,
       matchedProducts: matchCount + autoCreated,
       webhooks: ['orders/create', 'inventory_levels/update', 'products/update'],
       status: 'active',
     };
     save(KEYS.INTEGRATIONS, intg);

     console.log('[Sync] Complete:', matchCount, 'seed lines matched +', autoCreated, 'auto-created,', products.length, 'total products,', prodData.count, 'Shopify products');
     return { synced: true, matched: matchCount, autoCreated, totalProducts: products.length, shopifyTotal: prodData.count, locations: invData?.locations?.length || 0 };

   } catch (err) {
     console.warn('[Sync] Failed:', err.message);
     return { synced: false, reason: err.message };
   }
 }

// SHOPIFY ORDER DATA LAYER
// All functions read from am_sales (synced Shopify orders)
// ═══════════════════════════════════════════════════════════════

function getSales() {
  try { return JSON.parse(localStorage.getItem('am_sales') || '[]'); } catch(e) { return []; }
}

function getSalesSince(days) {
  const cutoff = new Date(Date.now() - days * 86400000).toISOString().slice(0,10);
  return getSales().filter(s => (s.date || '') >= cutoff);
}

function getSalesRevenue(sales) {
  return sales.reduce((s, o) => s + (o.total || 0), 0);
}

function getSalesByProduct(sales) {
  // Returns { mpId: { units, revenue, orders } }
  const map = {};
  for (const order of sales) {
    for (const item of (order.items || [])) {
      const id = item.mpId || '_unknown';
      if (!map[id]) map[id] = { units: 0, revenue: 0, orders: 0 };
      map[id].units += item.qty || 0;
      map[id].revenue += (item.qty || 0) * (item.price || 0);
      map[id].orders++;
    }
  }
  return map;
}

function getSalesByLocation(sales) {
  const map = {};
  for (const order of sales) {
    const loc = order.store || 'Online';
    if (!map[loc]) map[loc] = { units: 0, revenue: 0, orders: 0 };
    map[loc].orders++;
    map[loc].revenue += order.total || 0;
    for (const item of (order.items || [])) map[loc].units += item.qty || 0;
  }
  return map;
}

function getSalesTrend(days, buckets) {
  // Returns array of { date, revenue, orders } for sparkline
  const sales = getSalesSince(days);
  const bucketSize = Math.ceil(days / buckets);
  const result = [];
  for (let i = buckets - 1; i >= 0; i--) {
    const start = new Date(Date.now() - (i+1) * bucketSize * 86400000).toISOString().slice(0,10);
    const end = new Date(Date.now() - i * bucketSize * 86400000).toISOString().slice(0,10);
    const bucket = sales.filter(s => s.date >= start && s.date < end);
    result.push({ date: end, revenue: getSalesRevenue(bucket), orders: bucket.length });
  }
  return result;
}

function getShopifyCustomers() {
  // Build customer profiles from Shopify orders
  const sales = getSales().filter(s => s.source === 'shopify' && s.custId && s.custName !== 'Guest');
  const customers = {};
  for (const order of sales) {
    if (!order.custId) continue;
    if (!customers[order.custId]) {
      customers[order.custId] = {
        id: order.custId, name: order.custName,
        orders: 0, revenue: 0, firstOrder: order.date,
        lastOrder: order.date, items: []
      };
    }
    const c = customers[order.custId];
    c.orders++;
    c.revenue += order.total || 0;
    if (order.date > c.lastOrder) c.lastOrder = order.date;
    if (order.date < c.firstOrder) c.firstOrder = order.date;
    for (const item of (order.items || [])) {
      if (item.mpId) c.items.push(item.mpId);
    }
  }
  return Object.values(customers).sort((a,b) => b.revenue - a.revenue);
}

function getRealVelocity(mpId, days) {
  // Units sold per week for a master product from real orders
  const sales = getSalesSince(days || 30);
  const byProd = getSalesByProduct(sales);
  const units = (byProd[mpId] || {}).units || 0;
  return Math.round((units / (days || 30)) * 7 * 10) / 10;
}

function getMiniSparkline(data, color) {
  if (!data || data.length === 0) return '';
  const max = Math.max(...data.map(d => d.revenue), 1);
  const w = 60, h = 24;
  const pts = data.map((d, i) => {
    const x = Math.round((i / (data.length - 1)) * w);
    const y = Math.round(h - (d.revenue / max) * h);
    return `${x},${y}`;
  }).join(' ');
  return `<svg width="${w}" height="${h}" style="display:block"><polyline points="${pts}" fill="none" stroke="${color || 'var(--grn)'}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

 if (!inv) inv = Store.getInventoryFor(productId);
 const current = inv[location] || 0;

 });

 Store.getPOs().forEach(po => {

 });

 Store.getVendors().forEach(v => {
 if (v.name.toLowerCase().includes(q) || (v.short||'').toLowerCase().includes(q)) {
 results.push({type:'vendor', id:v.id, name:v.name, sub:v.country + ' · ' + (v.categories||[]).join(', '), route:'vendor-detail', param:v.id});

function renderFinValuation(){
  const prods=Store.getProducts();
  const LOCS=Store.LOCS;
  const season=Store.getCurrentSeason();

  const data=prods.map(p=>{
    const stock=Store.totalStock(p.id);
    const inv=Store.getInventoryFor(p.id)||{};
    const landed=Math.round(p.fob*1.34*100)/100;
    const costVal=Math.round(stock*landed);
    const retailVal=Math.round(stock*p.retail);
    const adjVel=Math.round(p.vel*season.multiplier*10)/10;
    const cover=adjVel>0?Math.round(stock/adjVel):999;
    return{...p,stock,inv,landed,costVal,retailVal,adjVel,cover};
  });

  const totalCost=data.reduce((s,d)=>s+d.costVal,0);
  const totalRetail=data.reduce((s,d)=>s+d.retailVal,0);
  const totalUnits=data.reduce((s,d)=>s+d.stock,0);

  // By location
  const locVal=LOCS.map(loc=>{
    const cost=prods.reduce((s,p)=>s+((Store.getInventoryFor(p.id)||{})[loc]||0)*Math.round(p.fob*1.34*100)/100,0);
    const retail=prods.reduce((s,p)=>s+((Store.getInventoryFor(p.id)||{})[loc]||0)*p.retail,0);
    const units=prods.reduce((s,p)=>s+((Store.getInventoryFor(p.id)||{})[loc]||0),0);
    return{loc,cost:Math.round(cost),retail:Math.round(retail),units};
  });

  // By category
  const catVal={};
  data.forEach(d=>{
    if(!catVal[d.cat])catVal[d.cat]={cost:0,retail:0,units:0,products:0};
    catVal[d.cat].cost+=d.costVal;catVal[d.cat].retail+=d.retailVal;
    catVal[d.cat].units+=d.stock;catVal[d.cat].products++;
  });

  // Aging (slow movers holding value)
  const slowValue=data.filter(d=>d.cover>24).reduce((s,d)=>s+d.costVal,0);

function renderAnScorecard(){
  const prods=Store.getProducts();
  const pos=Store.getPOs();
  const season=Store.getCurrentSeason();
  const custs=Store.getCustomers();
  const LOCS=Store.LOCS;

  if(!window._sc) window._sc={view:'executive',expand:{}};
  const SC=window._sc;

  // === COMPUTE ALL METRICS ===
  const totalStock=prods.reduce((s,p)=>s+Store.totalStock(p.id),0);
  const weeklyRev=prods.reduce((s,p)=>s+Math.round((p.vel||0)*season.multiplier*(p.retail||0)),0);
  const annualRev=weeklyRev*52;
  const weeklyCOGS=prods.reduce((s,p)=>s+Math.round(p.vel*season.multiplier*p.fob*1.34),0);
  const grossProfit=(weeklyRev-weeklyCOGS)*52;
  const grossPct=annualRev>0?Math.round(grossProfit/annualRev*100):0;
  const invCost=prods.reduce((s,p)=>s+Store.totalStock(p.id)*(p.fob||0)*1.34,0);
  const invRetail=prods.reduce((s,p)=>s+Store.totalStock(p.id)*p.retail,0);
  const gmroi=invCost>0?Math.round(grossProfit/invCost*100)/100:0;
  const turnover=invCost>0?Math.round(weeklyCOGS*52/invCost*10)/10:0;
  const avgOrder=custs.length?Math.round(custs.reduce((s,c)=>s+Store.getCustomerLTV(c),0)/custs.length):0;
  const totalLTV=custs.reduce((s,c)=>s+Store.getCustomerLTV(c),0);
  const oos=prods.filter(p=>Store.totalStock(p.id)===0&&p.vel>0).length;
  const totalVel=Math.round(prods.reduce((s,p)=>s+(p.vel||0)*season.multiplier,0));
  const openPOs=pos.filter(po=>po.status!=='complete');
  const incoming=openPOs.reduce((s,po)=>s+po.units,0);
  const unpaidAP=pos.flatMap(po=>(po.payments||[]).filter(pm=>pm.status!=='paid')).reduce((s,pm)=>s+(pm.amount||0),0);

  // Per-category metrics
  const cats={};
  prods.forEach(p=>{
    if(!cats[p.cat])cats[p.cat]={count:0,stock:0,rev:0,cogs:0,styles:0,oos:0};
    const c=cats[p.cat]; c.count++;
    c.stock+=Store.totalStock(p.id);
    c.rev+=Math.round(p.vel*season.multiplier*p.retail*52);
    c.cogs+=Math.round(p.vel*season.multiplier*p.fob*1.34*52);
    c.styles+=Store.getStyles(p.id).length;
    if(Store.totalStock(p.id)===0&&p.vel>0) c.oos++;
  });

  // Per-location metrics
  const locData=LOCS.map(loc=>{
    const units=prods.reduce((s,p)=>s+((Store.getInventoryFor(p.id)||{})[loc]||0),0);
    const retail=prods.reduce((s,p)=>s+((Store.getInventoryFor(p.id)||{})[loc]||0)*p.retail,0);
    return{loc,units,retail};
  });

  // Per-vendor metrics
  const vendorMetrics={};
  prods.forEach(p=>{
    const vn=(p.vendor||'').split('(')[0].trim();
    if(!vendorMetrics[vn])vendorMetrics[vn]={count:0,rev:0,units:0,onTime:0};
    vendorMetrics[vn].count++;
    vendorMetrics[vn].rev+=Math.round(p.vel*season.multiplier*p.retail*52);
    vendorMetrics[vn].units+=Store.totalStock(p.id);
  });

  const VIEWS={
    executive:{label:'Executive',metrics:[
      {l:'Annual Revenue',v:'$'+Math.round(annualRev/1000000*10)/10+'M',sub:'Weekly: $'+Math.round(weeklyRev/1000)+'K',health:annualRev>5000000?'green':'amber'},
      {l:'Gross Margin',v:grossPct+'%',sub:'$'+Math.round(grossProfit/1000)+'K annual',health:grossPct>=60?'green':grossPct>=45?'amber':'red'},

function renderOpsIntegrity(){
 const prods=Store.getProducts();
 const pos=Store.getPOs();
 const vendors=Store.getVendors();
 const checks=[];
 prods.forEach(p=>{
 const stock=Store.totalStock(p.id);
 const styles=Store.getStyles(p.id);
 if(!styles.length)checks.push({type:'error',entity:p.name,msg:'No styles defined',route:'product-detail',id:p.id});
 if(!p.hts)checks.push({type:'warning',entity:p.name,msg:'Missing HTS code',route:'pd-edit',id:p.id});
 if(!p.description)checks.push({type:'warning',entity:p.name,msg:'Missing description',route:'pd-edit',id:p.id});
 if(!p.heroImg)checks.push({type:'warning',entity:p.name,msg:'No product image',route:'product-detail',id:p.id});
 if(stock===0)checks.push({type:'error',entity:p.name,msg:'Zero total stock',route:'pd-inv',id:p.id});
 if(p.vel===0)checks.push({type:'warning',entity:p.name,msg:'Zero velocity',route:'product-detail',id:p.id});
 if(p.retail<=p.fob*1.5)checks.push({type:'warning',entity:p.name,msg:'Low margin (retail < 1.5x FOB)',route:'pd-cost',id:p.id});
 styles.forEach(s=>{
 if(!s.sku)checks.push({type:'error',entity:p.name+' / '+s.name,msg:'Missing SKU',route:'style-detail',id:p.id+'__'+s.id});
 });
 });

 pos.forEach(po=>{
 if(!po.eta&&po.status!=='complete')checks.push({type:'warning',entity:po.num,msg:'Missing ETA',route:'po-detail',id:po.id});
 const payments=(po.payments||[]);
 const overdue=payments.filter(pay=>pay.status==='overdue');
 if(overdue.length)checks.push({type:'error',entity:po.num,msg:overdue.length+' overdue payment(s)',route:'po-payments',id:po.id});
 });

 const errors=checks.filter(c=>c.type==='error');
 const warnings=checks.filter(c=>c.type==='warning');

 $('page').innerHTML=`
 <div style="max-width:860px">
 <div class="back-link" onclick="navigate('operations')">← Operations</div>
 <div style="font-family:var(--display);font-size:28px;font-weight:600;letter-spacing:-.4px;margin-bottom:8px">Data Integrity</div>
 <div class="page-sub">${checks.length} issues · ${errors.length} errors · ${warnings.length} warnings</div>

 <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;margin-bottom:20px">
 <div class="kpi-cell"><div style="font-family:var(--mono);font-size:22px;font-weight:700;color:${errors.length?'var(--brick)':'var(--grn)'}">${errors.length}</div><div class="kpi-label">errors</div></div>
 <div style="padding:14px 6px;text-align:center"><div style="font-family:var(--mono);font-size:22px;font-weight:700;color:${warnings.length?'var(--amb)':'var(--grn)'}">${warnings.length}</div><div class="kpi-label">warnings</div></div>
 </div>

 <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;margin-bottom:20px">
 <div style="padding:16px;border-right:1px solid var(--brd);text-align:center"><div style="font-family:var(--mono);font-size:24px;font-weight:700;color:${errors.length?'var(--brick)':'var(--grn)'}">${errors.length}</div><div style="font-size:10px;color:var(--faded)">errors</div></div>
 <div style="padding:16px;text-align:center"><div style="font-family:var(--mono);font-size:24px;font-weight:700;color:${warnings.length?'var(--amb)':'var(--grn)'}">${warnings.length}</div><div style="font-size:10px;color:var(--faded)">warnings</div></div>
 </div>

 ${errors.length?`<div style="font-family:var(--display);font-size:13px;font-weight:600;color:var(--brick);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--brick)">Errors — ${errors.length}</div>
 ${errors.map(c=>`
 <div onclick="navigate('${c.route}','${c.id}')" style="background:var(--sur2);border-left:3px solid var(--brick);border:1px solid var(--brd);border-left:3px solid var(--brick);border-radius:var(--rl);padding:10px 14px;margin-bottom:2px;cursor:pointer;display:grid;grid-template-columns:1fr 1fr" class="row-hover">
 <span style="font-weight:600;font-size:12px">${c.entity}</span>
 <span style="font-size:11px;color:var(--brick)">${c.msg}</span>
 </div>`).join('')}`:''}

 ${warnings.length?`<div style="font-family:var(--display);font-size:13px;font-weight:600;color:var(--amb);letter-spacing:.06em;text-transform:uppercase;margin:20px 0 10px;padding-bottom:8px;border-bottom:2px solid var(--amb)">Warnings — ${warnings.length}</div>
 ${warnings.map(c=>`
 <div onclick="navigate('${c.route}','${c.id}')" style="background:var(--sur2);border-left:3px solid var(--amb);border:1px solid var(--brd);border-left:3px solid var(--amb);border-radius:var(--rl);padding:10px 14px;margin-bottom:2px;cursor:pointer;display:grid;grid-template-columns:1fr 1fr" class="row-hover">

 ${!checks.length?'<div style="padding:40px;text-align:center;color:var(--grn);font-size:16px;font-weight:600">All data checks passed ✓</div>':''}

  const constr=dna.construction||{};const qc=dna.qc||{};
  const catSpecs=Store.CATEGORY_COMPONENTS[p.cat]||{};
  const allSpecs=Object.values(catSpecs).flat();
  const filledSpecs=allSpecs.filter(s=>constr[s.id]);

  const qcDone=qcItems.filter((_,i)=>qc[i]==='pass');

    `:`

  </div>`;

function saveDNAField(id,field,value,type){
 const prods=Store.getProducts();
 const idx=prods.findIndex(x=>x.id===id);
 if(idx<0)return;
 prods[idx][field]=type==='number'?parseFloat(value)||0:value;
 try{localStorage.setItem('am_products',JSON.stringify(prods));}catch(e){}
 toast(field+' saved');
 navigate('pd-dna',id);
}
function saveDNAConstruction(id,fieldId,value){

 dna.construction[fieldId]=value;
 try{localStorage.setItem(key,JSON.stringify(dna));}catch(e){}
 toast('Saved');
 navigate('pd-dna',id);
}

function saveDNAQC(id,item,status){

 navigate('pd-dna',id);

function getVariantInventory(productId) {
 const key = 'am_var_' + productId;
 try {
 const stored = JSON.parse(localStorage.getItem(key));
 if (stored) return stored;
 } catch(e) {}
 const p = Store.getProduct(productId);
 if (!p) return {};
 const styles = Store.getStyles(productId);
 const inv = Store.getInventoryFor(productId);
 const sizes = Store.SIZE_SETS[p.sizes] || [];
 const totalCurve = sizes.reduce((s, sz) => s + getDefaultQty(p.sizes, sz), 0) || 1;
 const stock = Store.totalStock(productId);

 const data = {};
 styles.forEach(s => {
 const styleFrac = s.vel / Math.max(1, styles.reduce((sum,x) => sum + x.vel, 0));
 const styleStock = Math.round(stock * styleFrac);
 data[s.id] = {};
 sizes.forEach(sz => {
 const szFrac = getDefaultQty(p.sizes, sz) / totalCurve;
 data[s.id][sz] = {};
 Store.LOCS.forEach(loc => {
 const locFrac = (inv[loc] || 0) / Math.max(1, stock);
 data[s.id][sz][loc] = Math.max(0, Math.round(styleStock * szFrac * locFrac));
 });
 });
 });

 try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
 return data;
}
function adjustVariant(productId, styleId, size, location, delta) {
 const data = getVariantInventory(productId);
 if (!data[styleId]) data[styleId] = {};
 if (!data[styleId][size]) data[styleId][size] = {};
 const current = data[styleId][size][location] || 0;
 data[styleId][size][location] = Math.max(0, current + parseInt(delta));
 try { localStorage.setItem('am_var_' + productId, JSON.stringify(data)); } catch(e) {}
 const p = Store.getProduct(productId);
 const s = Store.getStyles(productId).find(x => x.id === styleId);
 toast((delta > 0 ? '+' : '') + delta + ' ' + (s ? s.sku : '') + '-' + size + ' ' + location, delta > 0 ? 'success' : 'info');
}
function createVariantTransfer(productId, styleId, size, from, to, qty) {
 const transfers = JSON.parse(localStorage.getItem('am_transfers') || '[]');
 const p = Store.getProduct(productId);
 const s = Store.getStyles(productId).find(x => x.id === styleId);
 const sku = s ? s.sku + '-' + size : productId;
 const t = {
 id: 'TR-' + Date.now(),
 productId, styleId, size, sku,
 productName: p ? p.name : productId,
 styleName: s ? s.name : '',
 from, to, qty: parseInt(qty) || 0,
 status: 'requested',
 created: new Date().toISOString().split('T')[0]
 };
 transfers.push(t);
 try { localStorage.setItem('am_transfers', JSON.stringify(transfers)); } catch(e) {}
 toast('Transfer: ' + t.qty + '× ' + sku + ' ' + from + ' → ' + to, 'success');
 return t;
}
function getVariantStock(productId, styleId, size) {

function renderMktAssets(){
  const prods=Store.getProducts();
  const season=Store.getCurrentSeason();

  const assets=prods.map(p=>{
    const hasImg=!!p.heroImg;
    const hasDesc=p.description&&p.description.length>=20;
    const hasFeatures=(p.features||[]).length>=2;
    const hasShopify=!!p.shopifyUrl;
    const wa=Store.getWebAnalyticsFor(p.id)||{};
    const hasViews=(wa.views||0)>0;
    const score=[hasImg,hasDesc,hasFeatures,hasShopify,hasViews].filter(Boolean).length;
    return{...p,hasImg,hasDesc,hasFeatures,hasShopify,hasViews,score,total:5};
  });

  const avgScore=assets.length?Math.round(assets.reduce((s,a)=>s+a.score,0)/assets.length*10)/10:0;
  const complete=assets.filter(a=>a.score===5).length;

  $('page').innerHTML=`
  <div style="max-width:860px">
    <div style="margin-bottom:16px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--faded);padding:8px 0;min-height:44px" onclick="navigate('marketing')">← Marketing</div>
    <div style="font-family:var(--display);font-size:28px;font-weight:600;letter-spacing:-.4px;margin-bottom:4px">Asset Tracker</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--faded);margin-bottom:20px">${prods.length} products · ${complete} complete · avg ${avgScore}/5</div>

    <div style="font-size:9px;color:var(--faded);margin-top:2px">complete (5/5)</div></div>
      <div style="padding:14px 8px;border-right:1px solid var(--brd);text-align:center"><div style="font-family:var(--mono);font-size:20px;font-weight:700">${assets.filter(a=>a.score>0&&a.score<5).length}</div><div style="font-size:9px;color:var(--faded);margin-top:2px">in progress</div></div>
      <div style="padding:14px 8px;text-align:center"><div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${assets.filter(a=>a.score===0).length?'var(--brick)':'var(--grn)'}">${assets.filter(a=>a.score===0).length}</div><div style="font-size:9px;color:var(--faded);margin-top:2px">no assets</div></div>
    </div>

    ${assets.sort((a,b)=>a.score-b.score).map(a=>{
      const pct=Math.round(a.score/5*100);
      return `
    <div onclick="navigate('pd-edit','${a.id}')" style="background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rl);padding:12px 16px;margin-bottom:2px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);display:grid;grid-template-columns:1fr 120px 30px;align-items:center;gap:8px;transition:background .12s" onmouseover="this.style.background='var(--sur)'" onmouseout="this.style.background=''">
      <div>
        <span style="font-size:13px;font-weight:600">${a.name}</span>
        <div style="display:flex;gap:4px;margin-top:4px">
          ${[{l:'📷',d:a.hasImg},{l:'📝',d:a.hasDesc},{l:'✦',d:a.hasFeatures},{l:'🛒',d:a.hasShopify},{l:'👁',d:a.hasViews}].map(x=>`<span style="font-size:10px;opacity:${x.d?'1':'.25'}">${x.l}</span>`).join('')}
        </div>
      </div>
      <div style="height:4px;background:var(--brd);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${pct===100?'var(--grn)':pct>40?'var(--amb)':'var(--brick)'};border-radius:2px"></div></div>
      <span style="font-family:var(--mono);font-size:11px;text-align:right;font-weight:700;color:${pct===100?'var(--grn)':''}">${a.score}/5</span>
    </div>`;
    }).join('')}

function renderMktCalendar(){
  const pos=Store.getPOs();
  const prods=Store.getProducts();
  const camps=(()=>{try{return JSON.parse(localStorage.getItem('am_campaigns')||'[]');}catch(e){return[];}})();
  
  // Build timeline from POs and campaigns
  const months=[];
  const now=new Date();
  for(let i=-2;i<6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const label=d.toLocaleDateString('en-US',{month:'short',year:'numeric'});
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const monthPOs=pos.filter(po=>{if(!po.eta)return false;return po.eta.startsWith(key);});
    const monthCamps=camps.filter(c=>{if(!c.startDate)return false;return c.startDate.startsWith(key);});
    months.push({label,key,pos:monthPOs,camps:monthCamps,isCurrent:i===0});
  }

  $('page').innerHTML=`
  <div style="max-width:940px">
    <div style="margin-bottom:16px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--faded);padding:8px 0;min-height:44px" onclick="navigate('marketing')">← Marketing</div>
    <div style="font-family:var(--display);font-size:28px;font-weight:600;letter-spacing:-.4px;margin-bottom:4px">Launch Calendar</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--faded);margin-bottom:20px">PO arrivals + campaign launches · 8 month view</div>

    <div style="font-size:9px;color:var(--faded);margin-top:2px">POs with ETA</div></div>
      <div style="padding:14px 8px;border-right:1px solid var(--brd);text-align:center"><div style="font-family:var(--mono);font-size:20px;font-weight:700">${camps.length}</div><div style="font-size:9px;color:var(--faded);margin-top:2px">campaigns</div></div>
      <div style="padding:14px 8px;border-right:1px solid var(--brd);text-align:center"><div style="font-family:var(--mono);font-size:20px;font-weight:700">${pos.filter(po=>po.status==='in-transit').length}</div><div style="font-size:9px;color:var(--faded);margin-top:2px">in transit</div></div>
      <div style="padding:14px 8px;text-align:center"><div style="font-family:var(--mono);font-size:20px;font-weight:700">${pos.reduce((s,po)=>s+po.units,0).toLocaleString()}</div><div style="font-size:9px;color:var(--faded);margin-top:2px">total units</div></div>
    </div>

    ${months.map(m=>`
    <div style="margin-bottom:16px">
      <div style="font-family:var(--display);font-size:14px;font-weight:600;padding:8px 0;border-bottom:${m.isCurrent?'2px solid var(--gold)':'1px solid var(--brd)'};color:${m.isCurrent?'var(--gold)':'var(--ink)'};display:flex;justify-content:space-between">
        <span>${m.label}${m.isCurrent?' ← now':''}</span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--faded)">${m.pos.length} POs · ${m.camps.length} campaigns</span>
      </div>
      ${m.pos.map(po=>`
      <div onclick="navigate('po-detail','${po.id}')" style="display:grid;grid-template-columns:8px 1fr 50px;padding:8px 12px;border-bottom:1px solid var(--brd);cursor:pointer;align-items:center;gap:10px;transition:background .12s" onmouseover="this.style.background='var(--sur)'" onmouseout="this.style.background=''">
        <div style="width:8px;height:8px;border-radius:50%;background:${po.status==='complete'?'var(--grn)':po.status==='in-transit'?'var(--amb)':'var(--gold)'}"></div>
        <div><span style="font-size:12px;font-weight:500">${po.mpName}</span><span style="font-family:var(--mono);font-size:9px;color:var(--faded);margin-left:6px">${po.num} · ${po.units}u · ETA ${po.eta}</span></div>
        <span class="badge ${po.status==='complete'?'b-grn':po.status==='in-transit'?'b-amb':'b-blu'}" style="font-size:7px;text-align:center">${po.status}</span>
      </div>`).join('')}
      ${m.camps.map(c=>`
      <div style="display:grid;grid-template-columns:8px 1fr;padding:8px 12px;border-bottom:1px solid var(--brd);align-items:center;gap:10px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--gold)"></div>
        <div><span style="font-size:12px;font-weight:500">${c.name}</span><span style="font-family:var(--mono);font-size:9px;color:var(--faded);margin-left:6px">${c.type||''} · ${c.startDate||''}</span></div>
      </div>`).join('')}
      ${!m.pos.length&&!m.camps.length?'<div style="padding:8px 12px;font-size:11px;color:var(--faded)">No events</div>':''}

function runROPCalc(id){
 const p=Store.getProduct(id);if(!p)return;
 const s=Store.totalStock(id);
 const lead=parseFloat($('rc-l')?.value)||p.lead;
 const safety=parseFloat($('rc-s')?.value)||2;
 const target=parseFloat($('rc-t')?.value)||14;
 const growth=parseFloat($('rc-g')?.value)||0;
 const va=p.vel*(1+growth/100);
 const rop=Math.ceil(va*(lead/7)+va*safety);
 const oq=Math.ceil(va*target);
 const fe=Math.round(oq*p.fob);
 const isLate=s<=rop,isCrit=s<=va*safety;
 const el=$('rop-out');if(!el)return;
 el.innerHTML=`
 <div class="grid-2" style="gap:8px;margin-bottom:8px">
 ${[['Reorder point',rop,'var(--amb)'],['Rec. order qty',oq,''],['Est. FOB','$'+fe.toLocaleString(),'var(--grn)'],['Days cover',va>0?Math.round(s/va*7)+'d':'—',va>0&&Math.round(s/va*7)<60?'var(--red)':'']].map(([l,v,c])=>`<div style="padding:8px 10px;background:var(--sur);border-radius:var(--r)"><div class="t10 dim">${l}</div><div class="w6" style="font-size:16px;${c?'color:'+c:''}">${v}</div></div>`).join('')}
 </div>
 <div class="t11" style="padding:9px 10px;${isCrit?'background:var(--red-bg);color:var(--red)':isLate?'background:var(--amb-bg);color:var(--amb)':'background:var(--grn-bg);color:var(--grn)'};border-radius:var(--r)">
 ${isCrit?'⚠ CRITICAL — below safety stock. Order immediately.':isLate?`⚠ Past ROP. Start PO now. Est. FOB $${fe.toLocaleString()}.`:`✓ Above ROP. Plan PO within ${Math.max(0,Math.round((s-rop)/va*7-7))} days.`}
 </div>`;
}

 if(retail>0){

 _wiz.concept={season:$('wiz-season')?.value,vendor,units,fob,retail,etd,notes:$('wiz-notes')?.value||''};
