function renderDistribution(){
  const prods=Store.getProducts();
  const LOCS=Store.LOCS;
  const STORES=LOCS.filter(l=>l!=='Reserve');
  const season=Store.getCurrentSeason();

  if(!window._distTab) window._distTab={sort:'gap',filter:'',expand:{}};
  const D=window._distTab;

  // Calculate optimal distribution for each product
  const data=prods.map(p=>{
    const inv=Store.getInventoryFor(p.id)||{};
    const stock=Store.totalStock(p.id);
    const adjVel=Math.round(p.vel*season.multiplier*10)/10;

    // Store allocation weights (Lakewood=30%, Flatbush=20%, Crown Heights=15%, Monsey=25%, Online=10%)
    const weights={Lakewood:.30,Flatbush:.20,'Crown Heights':.15,Monsey:.25,Online:.10};
    const storeData=STORES.map(loc=>{
      const current=inv[loc]||0;
      const ideal=Math.round(stock*(weights[loc]||1/STORES.length));
      const gap=ideal-current;
      return{loc,current,ideal,gap};
    });
    const totalGap=storeData.reduce((s,d)=>s+Math.abs(d.gap),0);
    const reserve=inv.Reserve||0;

    return{...p,stock,adjVel,storeData,totalGap,reserve,inv};
  });

  const searched=D.filter?data.filter(d=>d.name.toLowerCase().includes(D.filter.toLowerCase())):data;
  const sorted=[...searched].sort((a,b)=>{
    if(D.sort==='gap')return b.totalGap-a.totalGap;
    if(D.sort==='stock')return b.stock-a.stock;
    if(D.sort==='name')return a.name.localeCompare(b.name);
    return 0;
  });

  const needsDistribution=data.filter(d=>d.totalGap>10);

  $('page').innerHTML=`
  <div style="max-width:940px">
    <div style="margin-bottom:16px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--faded);padding:8px 0;min-height:44px" onclick="navigate('inventory')">← Inventory</div>
    <div style="font-family:var(--display);font-size:28px;font-weight:600;letter-spacing:-.4px;margin-bottom:4px">Distribution</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--faded);margin-bottom:20px">${prods.length} products · ${STORES.length} stores · ${needsDistribution.length} need rebalancing</div>

    ${needsDistribution.length?`<div style="background:rgba(184,154,90,.06);border:1px solid rgba(184,154,90,.2);border-radius:var(--rl);padding:12px 16px;margin-bottom:16px;font-size:12px"><span style="font-weight:700;color:var(--amb)">${needsDistribution.length} products</span> are unevenly distributed across stores</div>`:''}

    <input type="text" placeholder="Search products..." value="${D.filter||''}" oninput="window._distTab.filter=this.value;navigate('distribution')" style="width:100%;border:1px solid var(--brd);border-radius:8px;padding:10px 14px;font-size:13px;background:var(--sur);margin-bottom:8px;font-family:var(--mono)"/>

    <div style="display:flex;gap:4px;margin-bottom:12px">
      ${[['gap','Imbalance ↓'],['stock','Stock ↓'],['name','Name A-Z']].map(([k,l])=>`<span onclick="window._distTab.sort='${k}';navigate('distribution')" style="cursor:pointer;padding:5px 10px;border-radius:14px;font-size:9px;font-family:var(--mono);border:1px solid ${D.sort===k?'var(--gold)':'var(--brd)'};background:${D.sort===k?'rgba(184,154,90,.12)':'var(--sur2)'};color:${D.sort===k?'var(--gold)':'var(--ink)'};font-weight:${D.sort===k?'600':'400'}">${l}</span>`).join('')}
    </div>

    ${sorted.map((p,i)=>{
      const ek='d_'+i;
      const expanded=D.expand[ek];
      return `
    <div style="background:var(--sur2);border:1px solid ${p.totalGap>20?'rgba(184,154,90,.2)':'var(--brd)'};border-radius:var(--rl);margin-bottom:3px;overflow:hidden">
      <div onclick="window._distTab.expand['${ek}']=!window._distTab.expand['${ek}'];navigate('distribution')" style="cursor:pointer;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;transition:background .12s" onmouseover="this.style.background='var(--sur)'" onmouseout="this.style.background=''">
        <div>
          <span style="font-size:14px;font-weight:600">${p.name}</span>
          <div style="font-family:var(--mono);font-size:9px;color:var(--faded)">${p.code} · ${p.stock} units · reserve ${p.reserve}</div>
        </div>
        <span style="font-family:var(--mono);font-size:11px;color:${p.totalGap>20?'var(--amb)':'var(--faded)'}">${p.totalGap>0?'±'+p.totalGap:'balanced'}</span>
      </div>
      ${expanded?`
      <div style="border-top:1px solid var(--brd);padding:12px 16px">
        ${p.storeData.map(s=>{
          const barMax=Math.max(1,...p.storeData.map(x=>Math.max(x.current,x.ideal)));
          const curW=Math.round(s.current/barMax*100);
          const idealW=Math.round(s.ideal/barMax*100);
          return `<div style="display:grid;grid-template-columns:90px 1fr 40px 40px;padding:4px 0;align-items:center;gap:8px;font-size:11px">
            <span style="color:var(--faded)">${s.loc}</span>
            <div style="position:relative;height:8px;background:var(--brd);border-radius:4px;overflow:visible">
              <div style="height:100%;width:${curW}%;background:${s.gap>5?'var(--amb)':s.gap<-5?'var(--brick)':'var(--grn)'};border-radius:4px"></div>
              <div style="position:absolute;left:${idealW}%;top:-1px;width:2px;height:10px;background:var(--ink);border-radius:1px;opacity:.5" title="Ideal: ${s.ideal}"></div>
            </div>
            <span style="font-family:var(--mono);text-align:right;font-weight:700">${s.current}</span>
            <span style="font-family:var(--mono);text-align:right;color:${s.gap>0?'var(--grn)':s.gap<0?'var(--brick)':'var(--faded)'};font-size:10px">${s.gap>0?'+'+s.gap:s.gap}</span>
          </div>`;
        }).join('')}
        <div style="display:flex;gap:6px;margin-top:8px">
          <button class="btn btn-sm" onclick="event.stopPropagation();navigate('transfers')">Transfer</button>
          <button class="btn btn-sm" onclick="event.stopPropagation();navigate('pd-inv','${p.id}')">Inventory</button>
        </div>
      </div>
      `:''}
    </div>`;
    }).join('')}
  </div>`;
}

function submitVariantTransfer(){
 const X=window._xfr;
 if(!X||!X.mpId||!X.styleId||!X.size||!X.from||!X.to||!X.qty){toast('Fill all fields','error');return;}

 const varStock=getVariantStock(X.mpId,X.styleId,X.size);
 const maxQty=varStock[X.from]||0;
 if(X.qty>maxQty){toast('Only '+maxQty+' available at '+X.from,'error');return;}
 if(X.from===X.to){toast('From and To must be different','error');return;}

 const p=Store.getProduct(X.mpId);
 const s=Store.getStyles(X.mpId).find(st=>st.id===X.styleId);
 const sku=s?s.sku+'-'+X.size:X.mpId;

 const transfers=(()=>{try{return JSON.parse(localStorage.getItem('am_transfers')||'[]');}catch(e){return[];}})();
 transfers.push({
 id:'xfr_'+Date.now(),
 mpId:X.mpId,
 styleId:X.styleId,
 size:X.size,
 sku,
 productName:p?p.name:'',
 styleName:s?s.name:'',
 from:X.from,
 to:X.to,
 qty:X.qty,
 reason:X.reason||'',
 status:'requested',
 date:new Date().toISOString().split('T')[0],
 requestedBy:'Admin'});
 try{localStorage.setItem('am_transfers',JSON.stringify(transfers));}catch(e){}

 Store.addNotif('info','Transfer',X.qty+'× '+sku+': '+X.from+' → '+X.to,'transfers');
 toast('Transfer requested: '+X.qty+'× '+sku);
 window._xfr={tab:'list',mpId:'',styleId:'',size:'',from:'',to:'',qty:0,search:'',reason:'',step:0};
 navigate('transfers');

function buildFacts() {
 const prods = Store.getProducts();
 const LOCS = Store.LOCS;
 const comps = compsLoad();
 const rows = [];
 const sellLocs = LOCS.filter(l=>l!=='Reserve'); // Only selling locations get velocity

 prods.forEach(p => {
 const styles = Store.getStyles(p.id);
 const inv = Store.getInventoryFor(p.id);
 const totalStock= Store.totalStock(p.id);
 const sizes = Store.SIZE_SETS[p.sizes] || Store.SIZE_SETS.suits;
 const core = Store.CORE[p.sizes] || [];
 const lnd = p.fob * 1.34;
 const mg = p.retail > 0 ? (p.retail - lnd) / p.retail * 100 : 0;
 const fitGroups = FIT_MAP[p.sizes] || { Standard: sizes };
 const nStyles = Math.max(styles.length, 1);
 const nSizes = sizes.length;
 const oosLocCount = sellLocs.filter(l=>(inv[l]||0)===0).length;
 const oosRate = sellLocs.length>0 ? (oosLocCount/sellLocs.length*100) : 0;
 const adjData = Store.getAdjustedVelocity(p.id);
 const adjRatio = p.vel>0 ? (adjData?.adjustedVel||p.vel)/p.vel : 1;
 const lostVelWk = Math.max(0, (adjData?.adjustedVel||p.vel) - p.vel);
 const myFabric = comps.fabric?.find(c=>c.cats.includes(p.id))?.name || '—';
 const myConst = comps.construction?.find(c=>c.cats.includes(p.id))?.name || '—';
 const myLining = comps.lining?.find(c=>c.cats.includes(p.id))?.name || '—';
 const myTrim = comps.trim?.find(c=>c.cats.includes(p.id))?.name || '—';

 const priceGroup = Object.entries(PRICE_GROUPS).find(([,fn])=>fn(p))?.[0] || 'value';

 const sizeToFit = {};
 Object.entries(fitGroups).forEach(([fit, szList]) => {
 szList.forEach(sz => { sizeToFit[sz] = fit; });
 });

 const effectiveStyles = styles.length > 0 ? styles : [{ id:'_none', code:'—', name:'(no styles)', color:'#aaa', vel:0, sell:p.sell || 0 }];

 effectiveStyles.forEach(s => {
 const sVel = s.vel || p.vel / nStyles;
 const sSell = s.sell || p.sell || 0;

 sizes.forEach(sz => {
 const szFraction = 1 / nSizes;
 const szVel = sVel * szFraction;
 const fit = sizeToFit[sz] || 'Standard';
 const length = sz.endsWith('S') ? 'Short' : sz.endsWith('L') ? 'Long' : sz.endsWith('R') ? 'Regular' : 'Standard';
 const isCore = core.includes(sz) ? 'Core' : 'Shoulder';

 LOCS.forEach(loc => {
 const isReserve = loc === 'Reserve';
 const locFrac = inv[loc] !== undefined
 ? (totalStock > 0 ? inv[loc] / totalStock : 0)
 : 1 / LOCS.length;
 const szLocStock = Math.round(totalStock / nStyles / nSizes * locFrac);
 const szLocVel = isReserve ? 0 : szVel / sellLocs.length;
 const szLocAdjV = isReserve ? 0 : szLocVel * adjRatio;
 const isOOS = !isReserve && szLocStock === 0;
 const locLostVel = isReserve ? 0 : (lostVelWk / nStyles / nSizes / sellLocs.length);

 rows.push({
 cat: p.cat,
 product: p.name,
 productId: p.id,
 vendor: p.vendor,
 sizeSystem: p.sizes,
 flag: p.flag,
 priceGroup,
 style: s.name,
 styleCode: s.code,
 colorGroup: getColorGroup(s.color),

 fit,
 length,
 isCore,

 neck: NECK_MAP[sz] || '—',
 waist: WAIST_MAP[sz] || '—',
 location: loc,
 channel: CHANNEL_MAP[loc] || 'Other',
 fabric: myFabric,
 construction: myConst,
 lining: myLining,
 trim: myTrim,
 season: p.season || 'Spring 2026',
 stock: szLocStock,
 vel: szLocVel,
 adjVel: szLocAdjV,
 sell: sSell,
 cover: szLocVel > 0 ? szLocStock / szLocVel * 7 : 999,
 xRate: szLocStock > 0 && szLocVel > 0 ? (szLocVel * 52) / szLocStock : (szLocVel > 0 ? 99 : 0),

 skuCount: 1,
 _retail: p.retail});
 });
 });
 });

function renderLevel(rows, dims, depth, ancestors) {
 if (!dims.length || depth >= dims.length) return '';

 const hasChildren = depth < dims.length - 1;

 rows.forEach(r => {

 groups[key].push(r);
 });
 let entries = Object.entries(groups);

 });

 const indent = depth * 20;
 const metDef = AX_METRICS;

 entries.forEach(([key, subRows]) => {

 const bgs = ['','rgba(0,0,0,.02)','rgba(0,0,0,.015)','rgba(0,0,0,.01)'];
 const bg = bgs[depth] || '';
 const fw = depth===0?'700':depth===1?'600':'400';

 const colorGroupSwatch = dim==='colorGroup' && key!=='Other' && key!=='—';
 const colorMap = {Navy:'#1a2a4a',Black:'#1a1a1a',Charcoal:'#4a4a4a',Grey:'#b0b0b0',White:'#f4f0ea','Light Blue':'#a0c0e0','Tan/Khaki':'#c4a870',Burgundy:'#6a1a2a',Brown:'#6a4020',Other:'#d0ccc4'};
 const swatch = needsSwatch
 ? `<span style="width:10px;height:10px;background:${subRows[0].styleColor};border:0.5px solid rgba(0,0,0,.15);vertical-align:middle;margin-right:5px;border-radius:2px;flex-shrink:0;display:inline-block"></span>`
 : colorGroupSwatch
 ? `<span style="width:10px;height:10px;background:${colorMap[key]||'#ccc'};border:0.5px solid rgba(0,0,0,.15);vertical-align:middle;margin-right:5px;border-radius:2px;flex-shrink:0;display:inline-block"></span>`
 : '';
 let keyColor = '';
 let keyBadge = '';
 if (dim==='flag') {
 const fc={reorder:'var(--red)',liquidate:'var(--red)',watch:'var(--amb)',promote:'var(--amb)',ok:'var(--grn)'};

 keyBadge=`<span class="t9 w7 uc" style="padding:1px 5px;background:${fbg[key]||''};color:${fc[key]||''};letter-spacing:.04em;border-radius:2px">${key}</span>`;
 } else {
 if (dim==='flag') keyColor='';
 }
 if (dim==='isCore') keyColor=key==='Core'?'color:var(--blu);font-weight:600':'color:var(--txt3)';
 if (dim==='channel') keyColor=key==='Warehouse'?'color:var(--txt3)':'';
 if (dim==='fit') {
 const fc={Short:'var(--blu)',Regular:'var(--grn)',Long:'var(--amb)',Standard:''};
 keyColor=`color:${fc[key]||''}`;
 }
 if (dim==='length') {
 const lc={Short:'var(--blu)',Regular:'var(--grn)',Long:'var(--amb)',Standard:''};
 keyColor=`color:${lc[key]||''}`;
 }
 if (dim==='priceGroup') {
 const pc={luxury:'var(--grn)',premium:'var(--grn)',mid:'var(--amb)',value:'var(--red)'};
 keyColor=`color:${pc[key]||''}`;
 }
 const metCells = metDef.map(m => {
 const v = agg[m.id];
 const c = m.color(v);

 return `<td class="code t11" style="padding:6px 8px;color:${c||'inherit'};${active?'background:rgba(201,169,110,.05);':''}${depth===0?'font-weight:700;':''}${active&&depth===0?'border-bottom:2px solid var(--gold);':''};text-align:right;border-bottom:1px solid var(--brd)">
 ${m.fmt(v)}
 </td>`;
 }).join('');
 const total = aggRows(entries.map(([,r])=>r).flat())[sortMet];

 html += `<tr style="background:${bg};cursor:${hasChildren?'pointer':'default'}"

 ${!isLeaf ? `<div style="height:2px;border-radius:1px;width:${Math.max(40,barPct)}%;margin-top:2px;max-width:120px;overflow:hidden;background:var(--brd)">

 </tr>`;

 }
 });

}

function getProductStack(id) {
  const p=Store.getProduct(id);if(!p)return null;
  const styles=Store.getStyles(id);const pos=Store.getPOs().filter(po=>po.mpId===id);
  const stock=Store.totalStock(id);const st=(()=>{try{return JSON.parse(localStorage.getItem('am_stack_'+id)||'{}');}catch(e){return{};}})();
  const dna=(()=>{try{return JSON.parse(localStorage.getItem('am_dna_'+id)||'{}');}catch(e){return{};}})();
  const constr=dna.construction||{};const qc=dna.qc||{};
  const catSpecs=Object.values(Store.CATEGORY_COMPONENTS[p.cat]||{}).flat();
  const hasVendor=p.vendor&&p.vendor!=='—';const hasFob=p.fob>0;const hasHts=p.hts&&p.hts.length>=4;
  const mk=(id2,label,done,val,action,actionLabel)=>({id:id2,label,done,val:val||'',action:action||'',actionLabel:actionLabel||''});
  const phases=[
    {id:'brief',label:'Brief',icon:'1',desc:'Product identity',sections:{
      'Identity':[mk('name','Product name',p.name?.length>2,p.name),mk('code','Code',p.code?.length>=3,p.code),mk('cat','Category',p.cat&&p.cat!=='Uncategorized',p.cat),mk('desc','Description',p.description?.length>=20,(p.description?.length||0)+' chars'),mk('retail','Retail price',p.retail>0,'$'+p.retail,"navigate('pd-edit','"+id+"')"),mk('img','Hero image',!!p.heroImg,p.heroImg?'Set':'Missing')]
    }},
    {id:'sourcing',label:'Sourcing',icon:'2',desc:'Vendor & materials',sections:{
      'Vendor':[mk('vendor','Vendor assigned',hasVendor,p.vendor,"navigate('pd-dna','"+id+"')"),mk('fob','FOB price',hasFob,'$'+p.fob),mk('lead','Lead time',p.lead>0,p.lead+'d'),mk('moq','MOQ',p.moq>0,p.moq+'u')]
    }},
    {id:'development',label:'Dev',icon:'3',desc:'Specs & samples',sections:{
      'Construction':catSpecs.map(s=>mk(s.id,s.label,!!constr[s.id],constr[s.id]||'—',"navigate('pd-dna','"+id+"')")),
      'Approval':[mk('sample','Sample approved',!!st.sampleApproved,st.sampleApproved||'Pending',"stackAction('"+id+"','sampleApproved')","Approve"),mk('fit','Fit approved',!!st.fitApproved,st.fitApproved||'Pending',"stackAction('"+id+"','fitApproved')","Approve")]
    }},
    {id:'costing',label:'Costing',icon:'4',desc:'Margin & pricing',sections:{
      'Cost':[mk('hts','HTS code',hasHts,p.hts||'—'),mk('duty','Duty rate',p.duty>0,p.duty+'%'),mk('margin','Margin check',p.retail>0&&hasFob,Math.round((p.retail-p.fob*1.34)/p.retail*100)+'%'),mk('marginOk','Margin approved',!!st.marginApproved,st.marginApproved||'Pending',"stackAction('"+id+"','marginApproved')","Approve")]
    }},
    {id:'content',label:'Content',icon:'5',desc:'Photos & copy',sections:{
      'Content':[mk('hero','Hero image',!!p.heroImg,p.heroImg?'Set':'Missing'),mk('desc2','Description 50+ chars',p.description?.length>=50,(p.description?.length||0)+' chars'),mk('shopify','Shopify listing',!!p.shopifyUrl,p.shopifyUrl?'Live':'No')]
    }},
    {id:'launch',label:'Launch',icon:'6',desc:'Go live',sections:{
      'Inventory':[mk('stock','Stock received',stock>0,stock+' units'),mk('dist','Distributed',Store.LOCS.filter(l=>(Store.getInventoryFor(id)||{})[l]>0).length>1,Store.LOCS.filter(l=>(Store.getInventoryFor(id)||{})[l]>0).length+' locations'),mk('live','Go live',p.status==='active',p.status||'dev',"stackAction('"+id+"','goLive')","Go Live")]
    }}
  ];
  phases.forEach(ph=>{const reqs=Object.values(ph.sections).flat();ph.total=reqs.length;ph.done=reqs.filter(r=>r.done).length;ph.pct=ph.total>0?Math.round(ph.done/ph.total*100):0;ph.complete=ph.pct===100;});
  const totalReqs=phases.reduce((s,ph)=>s+ph.total,0);const totalDone=phases.reduce((s,ph)=>s+ph.done,0);
  const totalPct=totalReqs>0?Math.round(totalDone/totalReqs*100):0;
  return{phases,totalDone,totalReqs,totalPct,p,styles,pos,stock};
}

function stackAction(productId, action) {
 const key='am_stack_'+productId;
 let state={};
 try{state=JSON.parse(localStorage.getItem(key)||'{}');}catch(e){}
 const today=new Date().toISOString().split('T')[0];

 if(action==='goLive'){
 const prods=Store.getProducts();
 const idx=prods.findIndex(x=>x.id===productId);
 if(idx>=0){prods[idx].status='active';try{localStorage.setItem('am_products',JSON.stringify(prods));}catch(e){}}
 toast('Product is now LIVE');
 }else if(action==='sampleApproved'){
 if(!confirm('Confirm: initial sample meets spec?'))return;
 state.sampleApproved=today;toast('Sample approved');
 }else if(action==='fitApproved'){
 if(!confirm('Confirm: fit sample approved on live model?'))return;
 state.fitApproved=today;toast('Fit approved');
 }else if(action==='marginApproved'){
 const p=Store.getProduct(productId);
 const landed=p.fob*1.34;
 const mg=p.retail>0?((p.retail-landed)/p.retail*100).toFixed(1):0;
 if(!confirm('Sign off margin at '+mg+'%? Retail $'+p.retail+', Landed $'+landed.toFixed(2)))return;
 state.marginApproved=today;toast('Margin approved');
 }
 try{localStorage.setItem(key,JSON.stringify(state));}catch(e){}
 navigate('product-stack',productId);
}

function getProductionPlan() {
 const prods = Store.getProducts();
 const season = Store.getCurrentSeason();
 const pos = Store.getPOs();
 const planned = (()=>{try{return JSON.parse(localStorage.getItem('am_planned_pos')||'[]');}catch(e){return[];}})();

 const plan = prods.map(p => {
 const stock = Store.totalStock(p.id);
 const styles = Store.getStyles(p.id);
 const adjVel = Math.round(p.vel * season.multiplier * 10) / 10;
 const weeklyUnits = adjVel;
 const coverWeeks = weeklyUnits > 0 ? Math.round(stock / weeklyUnits) : 999;
 const stockoutDate = weeklyUnits > 0 ? new Date(Date.now() + coverWeeks * 7 * 86400000) : null;
 const landed = Math.round(p.fob * 1.34 * 100) / 100;
 const margin = p.retail > 0 ? Math.round((p.retail - landed) / p.retail * 100) : 0;
 const weeklyRev = Math.round(weeklyUnits * p.retail);
 const lostRevPerWeek = stock <= 0 ? weeklyRev : 0;
 const activePOs = pos.filter(po => po.mpId === p.id && po.status !== 'complete');
 const incoming = activePOs.reduce((s, po) => s + po.units, 0);
 const earliestETA = activePOs.length ? activePOs.reduce((min, po) => {
 const eta = po.eta ? new Date(po.eta) : new Date(Date.now() + p.lead * 86400000);
 return eta < min ? eta : min;
 }, new Date('2099-01-01')) : null;
 const plannedForThis = planned.filter(pp => pp.mpId === p.id);
 const leadWeeks = Math.ceil(p.lead / 7);
 const reorderPoint = leadWeeks + 4; // Lead time + 4 weeks safety
 const needsReorder = coverWeeks <= reorderPoint && weeklyUnits > 0;
 const isUrgent = coverWeeks <= leadWeeks && weeklyUnits > 0;
 const isDead = coverWeeks <= 0 && weeklyUnits > 0;
 const targetCover = 16; // weeks
 const targetStock = Math.round(weeklyUnits * targetCover);
 const suggestedQty = Math.max(p.moq || 50, targetStock - stock - incoming);
 const suggestedFOB = Math.round(suggestedQty * p.fob);
 let priority = 0;
 if (isDead) priority = 100;
 else if (isUrgent) priority = 80;
 else if (needsReorder) priority = 60;
 else if (coverWeeks < 20) priority = 30;
 priority += Math.min(20, Math.round(margin / 5));
 priority += Math.min(15, Math.round(weeklyUnits));

 return {
 ...p, stock, styles, adjVel, weeklyUnits, coverWeeks, stockoutDate,
 landed, margin, weeklyRev, lostRevPerWeek, activePOs, incoming,
 earliestETA, plannedForThis, needsReorder, isUrgent, isDead,
 suggestedQty, suggestedFOB, leadWeeks, priority, targetCover
 };
 }).sort((a, b) => b.priority - a.priority);
 const totalLostRev = plan.filter(p => p.isDead).reduce((s, p) => s + p.weeklyRev, 0);
 const urgentCount = plan.filter(p => p.isUrgent).length;
 const reorderCount = plan.filter(p => p.needsReorder).length;
 const totalSuggestedFOB = plan.filter(p => p.needsReorder).reduce((s, p) => s + p.suggestedFOB, 0);
 const totalPlanned = planned.length;

 return { plan, totalLostRev, urgentCount, reorderCount, totalSuggestedFOB, totalPlanned, planned };
}

function addToFloorCart(mpId,styleId,size,price,label){
 if(!window._floor) window._floor={store:'Monsey',search:'',custSearch:'',mode:'cart',cart:[],custId:null};
 const existing=window._floor.cart.find(it=>it.mpId===mpId&&it.styleId===styleId&&it.size===size);
 if(existing){existing.qty++;} else {
 window._floor.cart.push({mpId,styleId,size,price,label,qty:1});
 }
 window._floor.mode='cart';
 toast(`${label} ${size} added`);
 navigate('floor');
}

function renderDemandIntelligence(){

  const D=window._demTab;

  // Demand signals for each product
  const signals=prods.map(p=>{
    const stock=Store.totalStock(p.id);
    const styles=Store.getStyles(p.id);
    const adjVel=Math.round(p.vel*season.multiplier*10)/10;
    const cover=adjVel>0?Math.round(stock/adjVel):999;
    const weeklyRev=Math.round(adjVel*p.retail);
    const wa=Store.getWebAnalyticsFor(p.id)||{};
    const sellThru=p.sell;
    const activePOs=pos.filter(po=>po.mpId===p.id&&po.status!=='complete');
    const incoming=activePOs.reduce((s,po)=>s+po.units,0);

    // Demand score: velocity + sell-through + web interest
    const velScore=Math.min(30,Math.round(adjVel*3));
    const sellScore=Math.min(30,Math.round(sellThru/3));
    const webScore=Math.min(20,Math.round((wa.convRate||0)*4));
    const marginBonus=p.retail>0&&(p.retail-p.fob*1.34)/p.retail>0.6?20:10;
    const demandScore=velScore+sellScore+webScore+marginBonus;

    // Signal type
    let signal='steady';
    if(sellThru>=85&&adjVel>=5) signal='hot';
    else if(sellThru>=70&&adjVel>=3) signal='rising';
    else if(sellThru<40&&adjVel<2) signal='slow';
    else if(stock===0&&adjVel>0) signal='stockout';

    return{...p,stock,styles,adjVel,cover,weeklyRev,wa,sellThru,incoming,demandScore,signal,activePOs};
  }).sort((a,b)=>b.demandScore-a.demandScore);

 distribution:null});
 navigate('demand');
}

async function testShopifyConnection() {
  const badge = document.getElementById('shopify-badge');
  const box = document.getElementById('shopify-status-box');
  const log = document.getElementById('shopify-log');
  const card = document.getElementById('shopify-card');
  if (!badge||!box) return;

  badge.textContent = 'TESTING...';
  badge.className = 'badge b-gry';
  box.textContent = 'Calling /api/shopify/status...';
  if(log) { log.style.display='block'; log.textContent=''; }

  const addLog = (msg) => { if(log){ log.textContent += '\n' + msg; log.scrollTop=log.scrollHeight; } };

  try {
    addLog('→ GET /api/shopify/status');
    const res = await fetch('/api/shopify/status');
    addLog('← HTTP ' + res.status);

    if (!res.ok) {
      const text = await res.text();
      addLog('Error body: ' + text.slice(0,200));
      badge.textContent = 'ERROR ' + res.status;
      badge.className = 'badge b-red';
      box.textContent = 'HTTP ' + res.status + ': ' + text.slice(0,100);
      return;
    }

    const data = await res.json();
    addLog('Response: ' + JSON.stringify(data));

    if (data.connected) {
      badge.textContent = 'CONNECTED';
      badge.className = 'badge b-grn';
      card.style.borderLeftColor = 'var(--grn)';
      box.innerHTML = '<span style="color:var(--grn)">✓ Connected</span> · Shop: ' + data.shop + ' · ' + data.plan + ' · ' + data.currency;
      Store.updateIntegration('shopify', { connected: true, store: data.shop, lastSync: new Date().toISOString() });
    } else {
      badge.textContent = 'NOT CONNECTED';
      badge.className = 'badge b-red';
      card.style.borderLeftColor = 'var(--red)';
      box.innerHTML = '<span style="color:var(--red)">✗ ' + (data.message||'Not connected') + '</span>';
    }
  } catch(err) {
    addLog('Exception: ' + err.message);
    badge.textContent = 'NETWORK ERROR';
    badge.className = 'badge b-red';
    box.textContent = 'Network error: ' + err.message;
  }
}

async function runShopifySync() {
  const box = document.getElementById('shopify-status-box');
  const log = document.getElementById('shopify-log');
  if(log) { log.style.display='block'; log.textContent='Starting full sync...'; }
  if(box) box.textContent = 'Syncing...';

  try {
    const result = await Store.syncFromShopify();
    if(box) box.textContent = result.synced

async function callAI(userMessage) {
 const context = gatherBusinessContext();

 const systemPrompt = `You are the AI advisor for Atica Man, a menswear company selling suits, shirts, blazers, pants, kapotes, and accessories through 4 retail stores (Lakewood NJ, Flatbush Brooklyn, Crown Heights Brooklyn, Monsey NY) plus Shopify online.

You have access to a real-time business snapshot. Use SPECIFIC numbers, product names, vendor names, and dollar amounts from the data. Never be vague — always give concrete, actionable advice.

Format your responses with:

- Numbered action items with priority (P1/P2/P3)
- Dollar amounts and unit quantities where relevant
- Specific product and vendor names
- Timeline for each action (today, this week, this month)

The Jewish calendar drives demand significantly — reference it when relevant.

Current business data:
${context}`;

 const messages = [];
 _aiHistory.slice(-4).forEach(h => {
 messages.push({ role: 'user', content: h.q });
 messages.push({ role: 'assistant', content: h.a });
 });
 messages.push({ role: 'user', content: userMessage });

 try {
 const response = await fetch('https://api.anthropic.com/v1/messages', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({
 model: 'claude-sonnet-4-20250514',
 max_tokens: 1500,
 system: systemPrompt,
 messages})});

 if (!response.ok) {
 const errText = await response.text();
 throw new Error('API error ' + response.status + ': ' + errText.slice(0, 200));
 }

 const data = await response.json();
 const text = data.content?.map(c => c.text || '').join('\n') || 'No response';
 return text;
 } catch (err) {
 return 'Error: ' + err.message + '\n\nMake sure you\'re connected to the internet. The AI advisor calls Claude via the Anthropic API.';

}
function aiMarkdown(text) {
 return text
 .replace(/### (.+)/g, '<h3>$1</h3>')
 .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
 .replace(/`(.+?)`/g, '<code>$1</code>')
 .replace(/^\- (.+)$/gm, '<li>$1</li>')
 .replace(/^(\d+)\. (.+)$/gm, '<li><strong>$1.</strong> $2</li>')
 .replace(/(<li>.*<\/li>)/gs, (match) => {
 if (!match.startsWith('<ul>')) return '<ul>' + match + '</ul>';
 return match;
 })
 .replace(/<\/ul>\s*<ul>/g, '')
 .replace(/\n{2}/g, '<br><br>')
 .replace(/\n/g, '<br>');
}
function extractActions(text) {
 const actions = [];
 const lines = text.split('\n');
 for (const line of lines) {
 const m = line.match(/(?:P[123]|🔴|🟡|🟢|URGENT|TODAY|THIS WEEK|ACTION|IMMEDIATE)[:\s—-]*(.+)/i);
 if (m) {
 const priority = line.match(/P1|URGENT|TODAY|🔴/i) ? 'P1' : line.match(/P2|🟡|THIS WEEK/i) ? 'P2' : 'P3';
 const actionText = m[1].replace(/\*\*/g, '').trim();
 let route = null, param = null;
 const lower = actionText.toLowerCase();
 if (lower.includes('create po') || lower.includes('new po') || lower.includes('place order') || lower.includes('reorder')) route = 'po-new';
 else if (lower.includes('transfer') || lower.includes('rebalance') || lower.includes('move stock')) route = 'transfers';
 else if (lower.includes('markdown') || lower.includes('promo') || lower.includes('campaign') || lower.includes('marketing')) route = 'marketing';
 else if (lower.includes('payment') || lower.includes('invoice') || lower.includes('cash') || lower.includes('pay ')) route = 'bookkeeping';
 else if (lower.includes('vendor') || lower.includes('supplier')) route = 'vendors';
 else if (lower.includes('customer') || lower.includes('vip') || lower.includes('loyalty')) route = 'crm';
 else if (lower.includes('shopify') || lower.includes('website')) route = 'integrations';
 else if (lower.includes('stock') || lower.includes('inventory')) route = 'inventory';
 const prods = Store.getProducts();
 for (const p of prods) {
 if (lower.includes(p.name.toLowerCase()) || lower.includes(p.code.toLowerCase())) {
 route = 'product-detail'; param = p.id; break;
 }
 }

 actions.push({ priority, text: actionText, route, param });
 }
 }
 return actions.slice(0, 8);
}

let _currentApp = null;

function getAppForRoute(route) {
 return APP_TREE.find(a => a.routes.includes(route)) || null;
}

function renderSidebarCtx(route) {
 const app = getAppForRoute(route);
 _currentApp = app;
 const el = document.getElementById('sb-context-nav');
 const nameEl = document.getElementById('sb-app-name');
 if (!el) return;

 if (!app) {
  // Home — show mini app grid in sidebar
  if (nameEl) nameEl.textContent = 'Atica Man';
  el.innerHTML = APP_TREE.map(a => `
   <div class="nav-item" onclick="navigate('${a.routes[0]}')" style="gap:10px;padding:10px 14px">
    <span style="font-size:16px;flex-shrink:0">${a.icon}</span>
    <div style="min-width:0">
     <div style="font-size:12px;font-weight:600;color:var(--sb-on)">${a.label}</div>
     <div style="font-size:9px;color:var(--sb-dim);margin-top:1px">${a.desc}</div>
    </div>
   </div>`).join('');
  return;
 }

 if (nameEl) nameEl.textContent = app.label;
 const backBtn = `<div class="nav-item" onclick="navigate('home')" style="gap:8px;padding:8px 14px;margin-bottom:4px;opacity:.6">

 </div>
 <div style="height:1px;background:var(--sb-brd);margin:0 14px 8px"></div>`;

 el.innerHTML = backBtn + app.nav.map(n => `
  <div class="nav-item ${route===n.route?'on':''}" id="nav-${n.route}"
   onclick="navigate('${n.route}'${n.sub?`,'${n.sub}'`:''})">
   ${n.label}

}

// ─── POS TRUNK ────────────────────────────────────────────────────
function renderTrunkPOS(sub) {
 sub = sub || 'pos-today';
 const sales = getSales();
 const today = new Date().toISOString().slice(0,10);
 const sales1 = getSalesSince(1);
 const sales7 = getSalesSince(7);
 const sales30 = getSalesSince(30);
 const rev1 = getSalesRevenue(sales1);
 const rev7 = getSalesRevenue(sales7);
 const rev30 = getSalesRevenue(sales30);
 const fmt = n => '$'+(n>=1000?(n/1000).toFixed(1)+'K':Math.round(n).toLocaleString());

 // Store breakdown from sales30
 const stores = ['Lakewood','Flatbush','Crown Heights','Monsey','Online'];
 const byStore = {};
 stores.forEach(s => byStore[s] = {rev:0, orders:0, units:0});
 sales30.forEach(o => {
  const loc = o.location || o.source || 'Online';
  const key = stores.find(s => loc.toLowerCase().includes(s.toLowerCase())) || 'Online';
  if (byStore[key]) { byStore[key].rev += o.total||0; byStore[key].orders++; byStore[key].units += (o.items||[]).reduce((s,i)=>s+(i.qty||i.quantity||1),0); }
 });
 const topStore = Object.entries(byStore).sort((a,b)=>b[1].rev-a[1].rev)[0];

 const tabs = [
  {id:'pos-today', label:'Today'},
  {id:'pos-stores', label:'By Store'},
  {id:'pos-orders', label:'Orders'},
 ];

 const tabBar = `<div style="display:flex;gap:0;border-bottom:1px solid var(--brd);margin-bottom:24px">
  ${tabs.map(t=>`<div onclick="renderTrunkPOS('${t.id}')" style="padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid ${sub===t.id?'var(--gold)':'transparent'};color:${sub===t.id?'var(--txt)':'var(--txt3)'};margin-bottom:-1px">${t.label}</div>`).join('')}
 </div>`;

 let body = '';

 if (sub === 'pos-today') {
  const todaySales = sales.filter(s=>(s.date||'').startsWith(today));
  const todayRev = getSalesRevenue(todaySales);
  const byHour = {};
  todaySales.forEach(o=>{
   const h = o.created_at ? new Date(o.created_at).getHours() : 12;
   byHour[h] = (byHour[h]||0) + (o.total||0);
  });
  const peak = Object.entries(byHour).sort((a,b)=>b[1]-a[1])[0];

  body = `
   <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px">
    <div class="mbox"><div class="mbox-l">Today</div><div class="mbox-v">${fmt(todayRev)}</div><div class="mbox-s">${todaySales.length} orders</div></div>
    <div class="mbox"><div class="mbox-l">7 Days</div><div class="mbox-v">${fmt(rev7)}</div><div class="mbox-s">${sales7.length} orders</div></div>
    <div class="mbox"><div class="mbox-l">30 Days</div><div class="mbox-v">${fmt(rev30)}</div><div class="mbox-s">${sales30.length} orders</div></div>
   </div>
   ${peak?`<div style="font-size:11px;color:var(--txt3);margin-bottom:20px">Peak hour today: <b style="color:var(--txt)">${peak[0]}:00</b> — ${fmt(peak[1])}</div>`:''}
   <div class="card2 mb16">
    <div class="sec-h"><span style="font-size:12px;font-weight:600">Today's Orders</span><span style="font-size:11px;color:var(--txt3)">${todaySales.length}</span></div>
    ${todaySales.length===0?`<div class="sec-empty">No sales synced for today yet — <span onclick="Store.syncFromShopify&&Store.syncFromShopify()" style="color:var(--gold);cursor:pointer">sync Shopify</span></div>`
    :todaySales.slice(0,20).map(o=>`
     <div class="drow fxb"><span style="font-size:12px">#${o.id||o.order_number||'—'} <span style="color:var(--txt3);font-size:11px">${o.customer||''}</span></span><span style="font-family:var(--mono);font-size:13px;font-weight:600">${fmt(o.total||0)}</span></div>
    `).join('')}
   </div>`;
 }

 if (sub === 'pos-stores') {
  const maxRev = Math.max(...Object.values(byStore).map(s=>s.rev), 1);
  body = `
   <div class="card2 mb16">
    <div class="sec-h"><span style="font-size:12px;font-weight:600">30-Day Revenue by Location</span></div>
    ${stores.map(s=>{
     const d=byStore[s]; const pct=Math.round(d.rev/maxRev*100);
     return `<div class="drow">
      <div class="fxb mb4"><span style="font-size:13px;font-weight:500">${s}</span><span style="font-family:var(--mono);font-size:13px;font-weight:700">${fmt(d.rev)}</span></div>
      <div style="height:4px;background:var(--brd);border-radius:2px;overflow:hidden;margin-bottom:4px"><div style="width:${pct}%;height:100%;background:var(--gold);border-radius:2px"></div></div>
      <div style="font-size:10px;color:var(--txt3)">${d.orders} orders · ${d.units} units</div>
     </div>`;
    }).join('')}
   </div>
   <div style="font-size:11px;color:var(--txt3)">Top: <b style="color:var(--txt)">${topStore?topStore[0]:'—'}</b> ${topStore?fmt(topStore[1].rev):''} · Data from last 30 days via Shopify sync</div>`;
 }

 if (sub === 'pos-orders') {
  const recent = [...sales30].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,50);
  body = `
   <div class="card2">
    <div class="sec-h">
     <span style="font-size:12px;font-weight:600">Recent Orders</span>
     <span style="font-size:11px;color:var(--txt3)">Last 30 days · ${sales30.length} total</span>
    </div>
    ${recent.length===0?`<div class="sec-empty">No orders — sync Shopify first</div>`
    :recent.map(o=>`
     <div class="drow fxb row-hover" style="align-items:flex-start">
      <div>
       <div style="font-size:12px;font-weight:500">#${o.id||o.order_number||'—'} <span style="color:var(--txt3);font-weight:400">${o.customer||''}</span></div>
       <div style="font-size:10px;color:var(--txt3);margin-top:2px">${o.date||''} · ${o.location||'Online'}</div>
      </div>
      <span style="font-family:var(--mono);font-size:13px;font-weight:700;flex-shrink:0">${fmt(o.total||0)}</span>
     </div>`).join('')}
   </div>`;
 }

 $('page').innerHTML = `
  <div style="max-width:860px">
   <div class="fxb mb20">
    <div>
     <div style="font-family:var(--display);font-size:28px;font-weight:600;letter-spacing:-.4px">Point of Sale</div>
     <div style="font-size:11px;color:var(--txt3);margin-top:4px">Live Shopify sales · ${stores.join(' · ')}</div>
    </div>
    <button class="btn btn-sm" onclick="Store.syncFromShopify&&Store.syncFromShopify().then(()=>renderTrunkPOS('${sub}'))">↻ Sync</button>
   </div>
   ${tabBar}
   ${body}
   <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:11px;color:var(--txt3)">Trunk → linked to Cash Flow</span>
    <button class="btn btn-sm" onclick="navigate('trunk-cf')">Cash Flow →</button>
   </div>
  </div>`;
}

// ─── CASH FLOW TRUNK ─────────────────────────────────────────────
function renderTrunkCF(sub) {
 sub = sub || 'cf-overview';
 const sales30 = getSalesSince(30);
 const sales7  = getSalesSince(7);
 const pos = Store.getPOs().filter(p=>p.status!=='complete');
 const rev30 = getSalesRevenue(sales30);
 const rev7  = getSalesRevenue(sales7);
 const fmt = n => '$'+(n>=1000?(n/1000).toFixed(1)+'K':Math.round(n).toLocaleString());
 const fmtFull = n => '$'+Math.round(n).toLocaleString();

 // Outflows: sum of pending PO payments
 const pendingPayments = pos.flatMap(po=>(po.payments||[]).filter(pm=>pm.status!=='paid'));
 const totalOutflow = pendingPayments.reduce((s,pm)=>s+(pm.amount||0),0);
 const net30 = rev30 - totalOutflow;

 // Monthly projection from Store
 const projection = Store.getCashFlowProjection ? Store.getCashFlowProjection(3) : [];

 const tabs = [
  {id:'cf-overview', label:'Overview'},
  {id:'cf-in', label:'Inflows'},
  {id:'cf-out', label:'Outflows'},
  {id:'cf-otb', label:'Open-to-Buy'},
 ];
 const tabBar = `<div style="display:flex;gap:0;border-bottom:1px solid var(--brd);margin-bottom:24px">
  ${tabs.map(t=>`<div onclick="renderTrunkCF('${t.id}')" style="padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid ${sub===t.id?'var(--gold)':'transparent'};color:${sub===t.id?'var(--txt)':'var(--txt3)'};margin-bottom:-1px">${t.label}</div>`).join('')}
 </div>`;

 let body = '';

 if (sub === 'cf-overview') {
  body = `
   <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px">
    <div class="mbox"><div class="mbox-l">Inflow (30d)</div><div class="mbox-v" style="color:var(--grn)">${fmt(rev30)}</div><div class="mbox-s">From Shopify orders</div></div>
    <div class="mbox"><div class="mbox-l">Outflow (POs)</div><div class="mbox-v" style="color:var(--red)">${fmt(totalOutflow)}</div><div class="mbox-s">${pendingPayments.length} pending payments</div></div>
    <div class="mbox"><div class="mbox-l">Net (30d)</div><div class="mbox-v" style="color:${net30>=0?'var(--grn)':'var(--red)'}">${fmt(net30)}</div><div class="mbox-s">${net30>=0?'Positive':'Negative'} flow</div></div>
   </div>
   ${projection.length?`
   <div class="card2 mb16">
    <div class="sec-h"><span style="font-size:12px;font-weight:600">3-Month Projection</span><span style="font-size:10px;color:var(--txt3)">Seasonal forecast</span></div>
    ${projection.slice(0,3).map(m=>{
     const mo = new Date(m.month||m.date||Date.now()).toLocaleString('default',{month:'short',year:'2-digit'});
     const inflow = m.inflow||m.revenue||0;
     const outflow = m.outflow||m.purchases||0;
     const net = inflow - outflow;
     return `<div class="drow fxb">
      <span style="font-size:12px;font-weight:500">${mo}</span>
      <div style="display:flex;gap:20px;font-family:var(--mono);font-size:12px">
       <span style="color:var(--grn)">+${fmt(inflow)}</span>
       <span style="color:var(--red)">−${fmt(outflow)}</span>
       <span style="font-weight:700;color:${net>=0?'var(--grn)':'var(--red)'}">${fmt(net)}</span>
      </div>
     </div>`;
    }).join('')}
   </div>`:
   `<div class="card2 mb16"><div class="sec-empty">No projection data — run Shopify sync</div></div>`}`;
 }

 if (sub === 'cf-in') {
  const byDay = {};
  sales30.forEach(o => {
   const d = (o.date||'').slice(0,10);
   if(d) byDay[d] = (byDay[d]||0)+(o.total||0);
  });
  const days = Object.entries(byDay).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14);
  body = `
   <div class="card2 mb16">
    <div class="sec-h"><span style="font-size:12px;font-weight:600">Daily Inflows — Last 30 Days</span><span style="font-family:var(--mono);font-size:12px;color:var(--grn)">${fmt(rev30)}</span></div>
    ${days.length===0?`<div class="sec-empty">No inflow data</div>`:
    days.map(([d,v])=>`
     <div class="drow fxb">
      <span style="font-size:11px;color:var(--txt3);font-family:var(--mono)">${d}</span>
      <span style="font-family:var(--mono);font-size:13px;font-weight:600;color:var(--grn)">${fmt(v)}</span>
     </div>`).join('')}
   </div>
   <div style="font-size:11px;color:var(--txt3)">Source: Shopify orders synced to POS · 7-day: ${fmt(rev7)}</div>`;
 }

 if (sub === 'cf-out') {
  body = `
   <div class="card2 mb16">
    <div class="sec-h"><span style="font-size:12px;font-weight:600">Pending PO Payments</span><span style="font-family:var(--mono);font-size:12px;color:var(--red)">${fmt(totalOutflow)}</span></div>
    ${pendingPayments.length===0?`<div class="sec-empty">No pending payments</div>`
    :pendingPayments.slice(0,30).map(pm=>`
     <div class="drow fxb">
      <div>
       <div style="font-size:12px;font-weight:500">${pm.label||pm.type||'Payment'}</div>
       <div style="font-size:10px;color:var(--txt3);margin-top:2px">${pm.dueDate||pm.due||'—'} · <span style="color:${pm.status==='overdue'?'var(--red)':'var(--amb)'}">${pm.status||'pending'}</span></div>
      </div>
      <span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--red)">${fmtFull(pm.amount||0)}</span>
     </div>`).join('')}
   </div>
   <div style="font-size:11px;color:var(--txt3)">Source: Open POs · <span onclick="navigate('pos')" style="color:var(--gold);cursor:pointer">View all POs →</span></div>`;
 }

 if (sub === 'cf-otb') {
  // Open-to-buy = projected inflow - committed outflows
  const projInflow = projection.length ? (projection[0].inflow||projection[0].revenue||0) : rev7*4;
  const committed = totalOutflow;
  const otb = projInflow - committed;
  body = `
   <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
    <div class="mbox"><div class="mbox-l">Projected Inflow (30d)</div><div class="mbox-v" style="color:var(--grn)">${fmt(projInflow)}</div><div class="mbox-s">Seasonal estimate</div></div>
    <div class="mbox"><div class="mbox-l">Committed Outflow</div><div class="mbox-v" style="color:var(--red)">${fmt(committed)}</div><div class="mbox-s">Open PO payments</div></div>
   </div>
   <div class="card2 mb20" style="border-color:${otb>=0?'rgba(74,154,74,.3)':'rgba(192,48,48,.3)'}">
    <div class="sec-h"><span style="font-size:14px;font-weight:700">Open-to-Buy</span></div>
    <div style="padding:24px;text-align:center">
     <div style="font-family:var(--mono);font-size:48px;font-weight:700;color:${otb>=0?'var(--grn)':'var(--red)'}">${fmt(Math.abs(otb))}</div>
     <div style="font-size:12px;color:var(--txt3);margin-top:8px">${otb>=0?'Available to commit to new POs':'Over-committed — review open POs'}</div>
    </div>
   </div>
   <div style="font-size:11px;color:var(--txt3)">Deshawn owns this module · linked to POs <span onclick="navigate('pos')" style="color:var(--gold);cursor:pointer">→</span></div>`;
 }

 $('page').innerHTML = `
  <div style="max-width:860px">
   <div class="fxb mb20">
    <div>
     <div style="font-family:var(--display);font-size:28px;font-weight:600;letter-spacing:-.4px">Cash Flow</div>
     <div style="font-size:11px;color:var(--txt3);margin-top:4px">Inflows from POS · Outflows from POs · Open-to-buy planning</div>
    </div>
    <button class="btn btn-sm" onclick="navigate('trunk-pos')">← POS</button>
   </div>
   ${tabBar}
   ${body}
  </div>`;
}

// ─── WIRE UP navigate() TO TREE ───────────────────────────────────
window._trunkRoutes = {
 'trunk-pos': sub => renderTrunkPOS(sub),
 'trunk-cf':  sub => renderTrunkCF(sub),
};

(function patchNavigate(){
 const _base = navigate;
 window.navigate = function(route, param) {
  if (window._trunkRoutes && window._trunkRoutes[route]) {
   currentRoute = route;
   closeMobileNav&&closeMobileNav();
   const hash = param ? `${route}/${param}` : route;
   if(window.location.hash !== '#'+hash){ window.location.hash = hash; }
   document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
   const navEl = document.getElementById('nav-'+route);
   if(navEl) navEl.classList.add('on');
   const page = document.getElementById('page');
   if(page){ page.innerHTML=''; page.style.opacity='0'; page.style.transform='translateY(4px)';
    setTimeout(()=>{page.style.transition='opacity .15s,transform .15s';page.style.opacity='1';page.style.transform='none';},16); }
   renderSidebarCtx(route);
   setTimeout(()=>window._trunkRoutes[route](param), 20);
   return;
  }
  _base(route, param);
  renderSidebarCtx(route);
 };
 // Init sidebar for landing route
 const hash = (window.location.hash||'').replace('#','').split('/')[0] || 'home';
 renderSidebarCtx(hash);
})();
</script>
