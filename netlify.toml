[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["lib/**"]

# ── Modular API routes (new) ──────────────────────────────────────────
[[redirects]]
  from   = "/api/products/*"
  to     = "/.netlify/functions/products/:splat"
  status = 200

[[redirects]]
  from   = "/api/orders/*"
  to     = "/.netlify/functions/orders/:splat"
  status = 200

[[redirects]]
  from   = "/api/inventory/*"
  to     = "/.netlify/functions/inventory/:splat"
  status = 200

[[redirects]]
  from   = "/api/pos/*"
  to     = "/.netlify/functions/pos/:splat"
  status = 200

[[redirects]]
  from   = "/api/ledger/*"
  to     = "/.netlify/functions/ledger/:splat"
  status = 200

[[redirects]]
  from   = "/api/status/*"
  to     = "/.netlify/functions/status/:splat"
  status = 200

[[redirects]]
  from   = "/api/workflow/*"
  to     = "/.netlify/functions/workflow/:splat"
  status = 200

[[redirects]]
  from   = "/api/finance/*"
  to     = "/.netlify/functions/finance/:splat"
  status = 200

[[redirects]]
  from   = "/api/purchase-orders/*"
  to     = "/.netlify/functions/purchase-orders/:splat"
  status = 200

[[redirects]]
  from   = "/api/customers/*"
  to     = "/.netlify/functions/customers/:splat"
  status = 200

[[redirects]]
  from   = "/api/shipments/*"
  to     = "/.netlify/functions/shipments/:splat"
  status = 200

# ── Webhooks ──────────────────────────────────────────────────
[[redirects]]
  from   = "/api/webhooks/shopify"
  to     = "/.netlify/functions/webhooks-shopify"
  status = 200

# ── V2 Modular Shell ─────────────────────────────────────────
[[redirects]]
  from   = "/v2"
  to     = "/atica_v2.html"
  status = 200

[[redirects]]
  from   = "/v2/*"
  to     = "/atica_v2.html"
  status = 200

# ── SPA fallback (must be last) ───────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/atica_app.html"
  status = 200

[context.production.environment]
  NODE_VERSION = "18"
