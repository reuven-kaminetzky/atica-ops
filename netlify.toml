[build]
  command = "npm run build:next"
  publish = ".next"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = ["lib/**"]

# ── Active Netlify Functions ──────────────────────────────
# Only 4 functions remain. Everything else is Next.js.

# Sync API (Bonney owns)
[[redirects]]
  from   = "/api/sync/*"
  to     = "/.netlify/functions/sync/:splat"
  status = 200

# Webhook receiver (Bonney owns)
[[redirects]]
  from   = "/api/webhooks/shopify"
  to     = "/.netlify/functions/webhooks-shopify"
  status = 200

[context.production.environment]
  NODE_VERSION = "20"
