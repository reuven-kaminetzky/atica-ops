[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API routing
[[redirects]]
  from = "/api/shopify/*"
  to = "/.netlify/functions/shopify/:splat"
  status = 200

[[redirects]]
  from = "/api/webhooks/*"
  to = "/.netlify/functions/webhooks-shopify"
  status = 200

[context.production.environment]
  SKIP_AUTH = "true"
  NODE_VERSION = "18"
