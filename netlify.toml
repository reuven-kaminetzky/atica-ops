[build]
  command = "npm run build"
  publish = ".next"

# ── Next.js on Netlify ─────────────────────────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Legacy Netlify functions still work alongside Next.js ──────
[functions]
  directory = "netlify/functions"

# ── Redirects: legacy API paths → Next.js API routes ──────────
[[redirects]]
  from = "/.netlify/functions/shopify/*"
  to = "/api/shopify/:splat"
  status = 200

# ── Environment ────────────────────────────────────────────────
[context.production.environment]
  SKIP_AUTH = "true"
  NODE_VERSION = "18"

[dev]
  command = "npm run dev"
  targetPort = 3000
  autoLaunch = false
